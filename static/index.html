// Partition files list → images vs non-image downloads
const splitFiles = (files) => {
  const images = [], others = [];
  for (const f of (files || [])) {
    const isImg = f.is_image || (f.url || f.name || '').match(/\.(png|jpe?g|gif|webp|bmp|svg)$/i);
    if (isImg) images.push(f.url || (f.path && ('/uploads/' + (f.path.split(/[\\/]/).pop()))));
    else others.push(f);
  }
  return { images, others };
};

// Patch a single message in place without touching the rest of the chat DOM.
// Critical for stable scroll during streaming — full render() replaces
// the whole chat scroller and scrollTop is lost.
function patchMessageInPlace(msg) {
  if (!msg) return false;
  const el = document.querySelector('[data-msg-id="' + CSS.escape(String(msg.id)) + '"]');
  if (!el) return false;
  const wasAtBottom = (() => {
    const col = document.getElementById('chat-scroll');
    if (!col) return false;
    return col.scrollHeight - col.scrollTop - col.clientHeight < 120;
  })();
  // Build the fresh section element from the updated state
  const tmp = document.createElement('div');
  tmp.innerHTML = renderMessage(msg);
  const next = tmp.firstElementChild;
  if (!next) return false;
  el.replaceWith(next);
  // Re-wire action buttons inside the patched section only
  wireMessageSection(next);
  if (wasAtBottom) {
    requestAnimationFrame(() => {
      const col = document.getElementById('chat-scroll');
      if (col) col.scrollTop = col.scrollHeight;
    });
  }
  return true;
}

// Re-wire click handlers for a single message section (scoped — avoids touching
// the rest of the page and its focused input).
function wireMessageSection(root) {
  if (!root) return;
  root.querySelectorAll('[data-copy]').forEach(b => {
    b.onclick = () => {
      navigator.clipboard.writeText(decodeURIComponent(b.dataset.copy));
      b.classList.add('copied');
      b.innerHTML = ico('check', 10) + '<span>copied</span>';
      setTimeout(() => { b.classList.remove('copied'); b.innerHTML = ico('copy', 10) + '<span>copy</span>'; }, 1500);
    };
  });
  root.querySelectorAll('[data-act="copy-msg"]').forEach(b => {
    b.onclick = () => { navigator.clipboard.writeText(decodeURIComponent(b.dataset.text || '')); toast('copied'); };
  });
  // msg-good/bad/regen/save handlers are set globally in wireEvents — they'll
  // be re-bound next render pass; for now we leave them unwired on freshly
  // patched nodes until the turn ends (user rarely clicks them mid-stream).
}

const handleWsMessage = (msg) => {
  const t = msg.type;

  // Server-initiated frame request (for camera_capture tool)
  if (t === 'frame_request') {
    const req_id = msg.request_id;
    let data = null;
    if (state.cameraOn) data = cameraSnapshot();
    const b64 = data ? (data.split(',')[1] || '') : '';
    try { state.ws.send(JSON.stringify({ type: 'frame_response', request_id: req_id, image_b64: b64 })); } catch {}
    return;
  }

  // First event for this turn — inject a pending assistant message into DOM
  // without a full render. We append it to the chat-scroll tree directly.
  if (!state.streaming && t !== 'status') {
    state.streaming = { id: 'stream-' + Date.now(), role: 'assistant', streaming: true, thinking: '', content: '', tools: [], time: Date.now(), _files: [], _images: [] };
    state.messages.push(state.streaming);
    // Append fresh <section> to the chat if it exists; fall back to full render otherwise
    const chatInner = document.querySelector('#chat-scroll .inner > div[style*="flex:1"]');
    if (chatInner) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderMessage(state.streaming);
      const el = tmp.firstElementChild;
      if (el) {
        chatInner.appendChild(el);
        requestAnimationFrame(() => {
          const col = document.getElementById('chat-scroll');
          if (col) col.scrollTop = col.scrollHeight;
        });
      }
    } else {
      render();
    }
  }
  const s = state.streaming;

  // Streaming deltas: update the live message's in-memory state, then patch DOM in place
  // (avoids a full render() on every token — eliminates flicker).
  if (t === 'status') { /* optional pre-turn status, ignore */ }
  else if (t === 'thinking_delta' || t === 'thinking') {
    if (s) {
      s.thinking += (msg.text || '');
      // Try in-place text update on the thinking block if it's already rendered
      const thEl = document.querySelector('[data-stream-think="' + CSS.escape(String(s.id)) + '"] .th-text');
      if (thEl) { thEl.textContent = s.thinking; return; }
      // Not yet in DOM → patch the whole message section in place (adds the block)
      if (patchMessageInPlace(s)) return;
    }
  }
  else if (t === 'content_delta' || t === 'content') {
    if (s) {
      s.content += (msg.text || '');
      const bodyEl = document.querySelector('[data-stream-body="' + CSS.escape(String(s.id)) + '"]');
      if (bodyEl) {
        bodyEl.innerHTML = renderMessageBody(s) + '<span class="cursor"></span>';
        // Stick to bottom IFF user is already near bottom
        const col = document.getElementById('chat-scroll');
        if (col && (col.scrollHeight - col.scrollTop - col.clientHeight) < 200) {
          col.scrollTop = col.scrollHeight;
        }
        return;
      }
      if (patchMessageInPlace(s)) return;
    }
  }
  else if (t === 'tool_call' || t === 'tool_start' || t === 'tool') {
    if (!s) return;
    const name = msg.name || msg.tool || 'tool';
    // Server emits tool_call AFTER completion (includes both args + result) — treat as ok
    s.tools.push({
      id: msg.id || (name + '-' + s.tools.length),
      name,
      status: msg.status || (msg.error ? 'err' : 'ok'),
      args: msg.args || msg.input || {},
      result: msg.result || msg.output || '',
    });
  }
  else if (t === 'tool_result' || t === 'tool_end') {
    if (!s) return;
    const tool = s.tools.find(x => x.id === msg.id) || s.tools.find(x => x.name === msg.name && x.status === 'running');
    if (tool) { tool.status = msg.error ? 'err' : 'ok'; tool.result = msg.result || msg.output || ''; }
  }
  else if (t === 'memory_recall' || t === 'recall') {
    if (msg.memories) {
      // Normalize server shape {tag,text,score,source} → UI shape
      // {relevance, tag, text, source}. Mark as authoritative so the
      // /api/knowledge/search fallback stops clobbering it.
      state.memoryPills = msg.memories.slice(0, 12).map(m => ({
        relevance: typeof m.relevance === 'number' ? m.relevance
                 : (typeof m.score === 'number' ? m.score : 0.5),
        tag: m.tag || 'memory',
        text: m.text || '',
        source: m.source || '',
        age: m.age || '',
      }));
      state.memoryPillsReal = true;  // from agent._build_context
    }
  }
  else if (t === 'reply' || t === 'done' || t === 'end' || t === 'finish') {
    if (s) {
      // Final payload — overwrite with authoritative text if reply carries one
      if (typeof msg.text === 'string' && msg.text) s.content = msg.text;
      if (typeof msg.thinking === 'string' && msg.thinking) s.thinking = msg.thinking;
      if (Array.isArray(msg.tools) && msg.tools.length) {
        // Server's reply.tools is result.tool_calls_made — a list of name
        // strings ("shell", "self_config", ...). Older code mapped each
        // string through ``tc.name`` which is undefined on a string, so
        // every reloaded tool row rendered as name="tool". Treat strings
        // as the name directly; preserve the object shape if the server
        // ever upgrades to sending richer per-call dicts.
        s.tools = msg.tools.map((tc, i) => {
          if (typeof tc === 'string') {
            return { id: tc + '-final-' + i, name: tc, status: 'ok', args: {}, result: '' };
          }
          return {
            id: tc.id || ((tc.name || 'tool') + '-final-' + i),
            name: tc.name || 'tool',
            status: tc.error ? 'err' : 'ok',
            args: tc.args || tc.input || {},
            result: tc.result || tc.output || '',
          };
        });
      }
      const split = splitFiles(msg.files);
      if (split.images.length) s._images = (s._images || []).concat(split.images);
      if (split.others.length) s._files = (s._files || []).concat(split.others);
      if (msg.audio_url) {
        try { new Audio(msg.audio_url).play().catch(() => {}); } catch {}
      }
      s.streaming = false;
      s._replyMeta = {
        tokens: msg.tokens || 0,
        prompt_tokens: msg.prompt_tokens || 0,
        duration_ms: msg.duration_ms || 0,
        tok_per_sec: msg.tok_per_sec || 0,
        context_hits: msg.context_hits || 0,
      };
      state.tokenTimeline.push(msg.tokens || (s.content || '').length);
      if (state.tokenTimeline.length > 12) state.tokenTimeline.shift();
      state.lastTurn = s._replyMeta;
    }
    const finalContent = s && s.content;
    state.streaming = null;
    state.busy = false;
    // Background refreshes — call silent so they DON'T trigger full render()
    // that would blow away chat-scroll and reset scrollTop.
    loadThreads({ silent: true });
    loadStatus({ silent: true });
    // Surgically update inspector to show live recalled memories + latency
    // without a full render() that would reset chat scroll.
    { const _el = document.querySelector('aside.inspector');
      if (_el && state.view === 'chat' && state.inspectorOn) {
        const _t = document.createElement('div');
        _t.innerHTML = renderInspector();
        const _n = _t.firstElementChild;
        if (_n) _el.replaceWith(_n);
      } }
    if (state.voiceLive && state._voiceAwaiting) {
      state._voiceAwaiting = false;
      voicePlayReply(finalContent || '');
    }
  }
  else if (t === 'files') {
    if (Array.isArray(msg.files) && s) {
      const split = splitFiles(msg.files);
      s._images = (s._images || []).concat(split.images);
      s._files = (s._files || []).concat(split.others);
    }
  }
  else if (t === 'image') {
    if (s && (msg.url || msg.b64)) {
      s._images = (s._images || []).concat([msg.url || ('data:image/png;base64,' + msg.b64)]);
    }
  }
  else if (t === 'error') {
    if (s) { s.content += '\n[error: ' + (msg.text || msg.error || 'unknown') + ']'; s.streaming = false; }
    state.streaming = null; state.busy = false;
    if (state.voiceLive) { state.voiceState = 'listening'; state._voiceAwaiting = false; }
  }
  // Targeted in-place patch for the streaming/final message only.
  // Avoids full render() which replaces the chat-scroll container and
  // loses scrollTop. If the patch target is gone (view changed), fall back.
  const target = s || state.messages[state.messages.length - 1];
  const patched = target ? patchMessageInPlace(target) : false;
  const turnEnded = t === 'reply' || t === 'done' || t === 'end' || t === 'finish' || t === 'error';
  if (!patched) {
    render();
  } else if (turnEnded) {
    // Turn ended — refresh inspector / topbar / composer surgically so we
    // don't touch the chat-scroll container (preserves scrollTop). Updating
    // the composer is critical: the Stop button must flip back to Send when
    // state.busy just became false.
    const inspEl = document.querySelector('aside.inspector');
    if (inspEl) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderInspector();
      const next = tmp.firstElementChild;
      if (next) inspEl.replaceWith(next);
    }
    const topBarEl = document.querySelector('header.topbar');
    if (topBarEl) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderTopBar();
      const next = tmp.firstElementChild;
      if (next) {
        topBarEl.replaceWith(next);
        document.querySelectorAll('[data-act="palette"]').forEach(b => b.onclick = openPalette);
        document.querySelectorAll('[data-act="toggle-threadlist"]').forEach(b => {
          b.onclick = () => { state.threadlistOpen = !state.threadlistOpen; render(); };
        });
      }
    }
    // Composer lives at the end of `.scroll-col .inner` — re-render it
    // without touching the messages list above.
    const composerEl = document.querySelector('.composer');
    if (composerEl && state.view === 'chat') {
      // Preserve textarea state across the swap so the user doesn't lose
      // whatever they started typing during the turn.
      const ta = document.getElementById('composer-ta');
      const pendingText = ta ? ta.value : '';
      const caretStart = ta ? ta.selectionStart : 0;
      const caretEnd = ta ? ta.selectionEnd : 0;
      // Re-run the composer slice of renderChatView by pulling state and
      // rebuilding from the same builder — cheapest path is a full render,
      // but that would reset scrollTop. Instead, just toggle the right side.
      const right = composerEl.querySelector('.right');
      if (right) {
        right.innerHTML =
          '<span class="counter" id="composer-count">' + pendingText.length + '</span>' +
          (state.busy
            ? '<button class="btn-danger" data-act="abort-turn" style="padding:5px 12px;font-size:12px;display:inline-flex;align-items:center;gap:5px">' + ico('close', 11) + 'Stop</button>'
            : '<button class="btn-primary" id="composer-send"' + (pendingText.trim() ? '' : ' disabled') + '>Send <span class="kbd">↵</span></button>');
        // Re-wire the right-side buttons
        right.querySelectorAll('[data-act="abort-turn"]').forEach(b => {
          b.onclick = async () => {
            try { await api('/api/abort', { method: 'POST' }); toast('stopping…'); state.busy = false; state.streaming = null; render(); }
            catch { toast('abort failed', 'err'); }
          };
        });
        const sendBtn = document.getElementById('composer-send');
        if (sendBtn) sendBtn.onclick = () => {
          const val = (ta && ta.value || '').trim(); if (!val) return;
          sendMessage(ta.value); ta.value = ''; ta.style.height = 'auto';
          const c = document.getElementById('composer-count'); if (c) c.textContent = '0';
          sendBtn.disabled = true;
        };
      }
      // Restore textarea focus + caret if the user was mid-typing
      if (ta && document.activeElement !== ta) {
        try { ta.focus(); ta.setSelectionRange(caretStart, caretEnd); } catch {}
      }
    }
  }
};

const sendMessage = (text, opts) => {
  opts = opts || {};
  const atts = state.pendingAttachments || [];
  const frame = state.capturedFrame;
  const hasPayload = (text && text.trim()) || atts.length || frame;
  if (!hasPayload || !state.wsReady) return;

  // Build text with file refs appended (server auto-appends WS document ref; we're not using that field for multi-file)
  let finalText = (text || '').trim();
  for (const a of atts.filter(x => !x.isImage)) {
    const sizeKb = (a.size || 0) / 1024;
    finalText += (finalText ? '\n\n' : '') +
      '[File attached: ' + a.name + ' (' + sizeKb.toFixed(1) + ' KB) — saved at ' + a.path +
      '. To view contents call read_file(path).]';
  }

  // Pick an image: prefer explicit frame, else first image attachment
  let image_b64 = null;
  if (frame) {
    // frame is a data URL "data:image/png;base64,XXX"
    image_b64 = frame.split(',')[1] || frame;
  } else {
    const firstImg = atts.find(a => a.isImage && a.b64);
    if (firstImg) image_b64 = (firstImg.b64.split(',')[1] || firstImg.b64);
    // Append text refs for remaining images
    const imgs = atts.filter(a => a.isImage);
    for (let i = 1; i < imgs.length; i++) {
      const a = imgs[i];
      finalText += (finalText ? '\n\n' : '') +
        '[Image attached: ' + a.name + ' — saved at ' + a.path + '.]';
    }
    // If first image doesn't have b64 (e.g. server-only path), still add ref
    if (firstImg && !firstImg.b64) {
      finalText += (finalText ? '\n\n' : '') +
        '[Image attached: ' + firstImg.name + ' — saved at ' + firstImg.path + '.]';
    }
  }

  // Render optimistic user bubble
  const userMsg = {
    id: 'u-' + Date.now(),
    role: 'user',
    content: finalText || '(attachment)',
    time: Date.now(),
    _images: image_b64 ? ['data:image/png;base64,' + image_b64] : [],
    _files: atts.filter(a => !a.isImage).map(a => ({ name: a.name, path: a.path, size: a.size })),
  };
  state.messages.push(userMsg);
  state.busy = true;

  const payload = { text: finalText, thread_id: state.activeThreadId };
  if (image_b64) payload.image_b64 = image_b64;
  if (opts.live) payload.live = true;
  state.ws.send(JSON.stringify(payload));

  // Clear pending after send
  state.pendingAttachments = [];
  state.capturedFrame = null;

  render(); scrollToBottom();
};

// ───── Attachments ─────
const readFileAsDataURL = (f) => new Promise((res, rej) => {
  const r = new FileReader();
  r.onload = () => res(r.result);
  r.onerror = rej;
  r.readAsDataURL(f);
});

async function attachFiles(files, opts) {
  opts = opts || {};
  const list = Array.from(files || []);
  if (!list.length) return;
  for (const f of list) {
    const isImage = opts.imageOnly || (f.type || '').startsWith('image/');
    try {
      const fd = new FormData(); fd.append('file', f);
      const r = await api('/api/knowledge/upload', { method: 'POST', body: fd });
      const entry = {
        id: 'a-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6),
        name: r.name || f.name,
        path: r.path,
        size: r.size || f.size || 0,
        type: f.type || '',
        isImage,
      };
      if (isImage) {
        try { entry.b64 = await readFileAsDataURL(f); } catch {}
      }
      state.pendingAttachments.push(entry);
      render();
    } catch {
      toast('upload failed: ' + f.name, 'err');
    }
  }
}

function pickAttachments(opts) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.multiple = true;
  if (opts && opts.imageOnly) inp.accept = 'image/*';
  inp.onchange = () => attachFiles(inp.files, opts);
  inp.click();
}

function dropAttachment(id) {
  state.pendingAttachments = state.pendingAttachments.filter(a => a.id !== id);
  render();
}

// ───── Camera PiP ─────
async function cameraStart() {
  if (state.cameraOn) return;
  try {
    const constraints = { video: state.cameraDeviceId
      ? { deviceId: { exact: state.cameraDeviceId } }
      : true };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    state.cameraStream = stream;
    state.cameraOn = true;
    render();
    // Attach stream to the video element (after render)
    setTimeout(() => {
      const v = document.getElementById('pip-video');
      if (v) { v.srcObject = stream; v.play().catch(() => {}); }
    }, 30);
  } catch (e) {
    toast('camera unavailable: ' + (e.message || e.name || 'error'), 'err');
  }
}
function cameraStop() {
  if (state.cameraStream) {
    try { state.cameraStream.getTracks().forEach(t => t.stop()); } catch {}
  }
  state.cameraStream = null;
  state.cameraOn = false;
  render();
}
function cameraSnapshot() {
  const v = document.getElementById('pip-video');
  if (!v || !v.videoWidth) return null;
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  return c.toDataURL('image/jpeg', 0.85);
}
function cameraCaptureToComposer() {
  const data = cameraSnapshot();
  if (!data) { toast('camera not ready', 'err'); return; }
  state.capturedFrame = data;
  const pip = document.querySelector('.camera-pip');
  if (pip) { pip.classList.add('flash'); setTimeout(() => pip.classList.remove('flash'), 180); }
  render();
}

// ───── Live Voice Mode ─────
async function voiceStart() {
  if (state.voiceLive) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    const mediaRec = new MediaRecorder(stream, { mimeType: mime });
    const chunks = [];
    mediaRec.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
    state.voiceCtx = { audioCtx, analyser, stream, mediaRec, chunks, raf: null, speaking: false, silenceStart: 0 };
    state.voiceLive = true; state.voiceState = 'listening';
    render();
    voiceLoop();
  } catch (e) {
    toast('mic unavailable: ' + (e.message || e.name || 'error'), 'err');
    state.voiceLive = false; state.voiceState = 'idle';
    render();
  }
}
function voiceStop() {
  const ctx = state.voiceCtx;
  if (ctx) {
    try { if (ctx.mediaRec && ctx.mediaRec.state !== 'inactive') ctx.mediaRec.stop(); } catch {}
    try { ctx.stream.getTracks().forEach(t => t.stop()); } catch {}
    try { ctx.audioCtx.close(); } catch {}
    if (ctx.raf) cancelAnimationFrame(ctx.raf);
  }
  state.voiceCtx = null; state.voiceLive = false; state.voiceState = 'idle';
  render();
}
function voiceLoop() {
  const ctx = state.voiceCtx; if (!ctx || !state.voiceLive) return;
  if (state.voiceState !== 'listening') { ctx.raf = requestAnimationFrame(voiceLoop); return; }
  const buf = new Uint8Array(ctx.analyser.fftSize);
  ctx.analyser.getByteTimeDomainData(buf);
  // RMS
  let sum = 0;
  for (let i = 0; i < buf.length; i++) { const v = (buf[i] - 128) / 128; sum += v*v; }
  const rms = Math.sqrt(sum / buf.length);
  const THRESHOLD = 0.035; // tweak if too sensitive
  const now = performance.now();
  if (rms > THRESHOLD) {
    if (!ctx.speaking) {
      ctx.speaking = true; ctx.chunks = [];
      try { ctx.mediaRec.start(250); } catch {}
    }
    ctx.silenceStart = 0;
  } else if (ctx.speaking) {
    if (!ctx.silenceStart) ctx.silenceStart = now;
    if (now - ctx.silenceStart > 900) {
      // End of utterance
      ctx.speaking = false;
      try { ctx.mediaRec.stop(); } catch {}
      state.voiceState = 'thinking';
      render();
      setTimeout(async () => {
        const chunks = ctx.chunks.slice();
        ctx.chunks = [];
        if (!chunks.length) { state.voiceState = 'listening'; render(); return; }
        const blob = new Blob(chunks, { type: ctx.mediaRec.mimeType || 'audio/webm' });
        try {
          const fd = new FormData();
          fd.append('audio', blob, 'utterance.webm');
          const r = await fetch('/api/transcribe', { method: 'POST', body: fd });
          const j = await r.json();
          const text = (j && (j.text || j.transcript || '')).trim();
          if (!text) { state.voiceState = 'listening'; render(); return; }
          // Send as live-flagged WS message
          sendMessage(text, { live: true });
          state._voiceAwaiting = true;
        } catch {
          toast('stt failed', 'err');
          state.voiceState = 'listening'; render();
        }
      }, 30);
    }
  }
  ctx.raf = requestAnimationFrame(voiceLoop);
}
async function voicePlayReply(text) {
  if (!state.voiceLive || !text || !text.trim()) return;
  state.voiceState = 'speaking'; render();
  try {
    const r = await fetch('/api/tts', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!r.ok) throw 0;
    const blob = await r.blob();
    const a = new Audio(URL.createObjectURL(blob));
    await new Promise((res) => { a.onended = res; a.onerror = res; a.play().catch(res); });
  } catch {}
  if (state.voiceLive) { state.voiceState = 'listening'; render(); }
}

async function loadThreads(opts) {
  try {
    const t = await api('/api/threads');
    const list = Array.isArray(t) ? t : (t.threads || []);
    state.threads = list;
    if (!state.activeThreadId) {
      try { const a = await api('/api/threads/active'); if (a && a.id) state.activeThreadId = a.id; } catch {}
      if (!state.activeThreadId && list.length) state.activeThreadId = list[0].id;
    }
    if (opts && opts.silent) patchThreadList();
    else render();
  } catch (e) { console.warn('threads load', e); }
}

// Targeted threadlist replacement — updates message counts / previews without
// touching the chat scroller.
function patchThreadList() {
  const el = document.querySelector('aside.threadlist');
  if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderThreadList();
  const next = tmp.firstElementChild;
  if (!next) return;
  el.replaceWith(next);
  // Re-wire thread row clicks on the new element
  next.querySelectorAll('[data-thread]').forEach(b => {
    b.onclick = (e) => { if (e.target.closest('.tl-actions')) return; switchThread(b.dataset.thread); };
  });
  next.querySelectorAll('[data-act="new-thread"]').forEach(b => { b.onclick = newThread; });
  const search = next.querySelector('[data-search="thread"]');
  if (search) search.addEventListener('input', (e) => { state.threadSearch = e.target.value; render(); });
}

async function loadActiveMessages(opts) {
  opts = opts || {};
  if (!state.activeThreadId) { state.messages = []; hydrateInspectorFromHistory(); return; }
  try {
    const h = await api('/api/history?thread_id=' + state.activeThreadId + '&limit=200');
    const items = Array.isArray(h) ? h : (h.messages || h.history || []);
    // Silent polls (used by routine-thread auto-refresh) skip the hydrate
    // + scroll-to-bottom steps if the message count hasn't changed — that
    // way a user scrolled mid-history isn't yanked every 3 seconds.
    if (opts.silent && state.messages.length === items.length) return;
    state.messages = items.map((m, i) => {
      const meta = m.meta || {};
      // Server stores tool details inside meta; surface them so the chat UI
      // shows the same thinking/tool-call history on reload as during the live turn.
      const toolsRaw = meta.tool_details || meta.tools || m.tools || [];
      const tools = Array.isArray(toolsRaw) ? toolsRaw.map((t, ti) => {
        if (typeof t === 'string') return { id: 't-' + i + '-' + ti, name: t, status: 'ok', args: {}, result: '' };
        return {
          id: t.id || ('t-' + i + '-' + ti),
          name: t.name || t.tool || 'tool',
          status: t.error ? 'err' : (t.status || 'ok'),
          args: t.args || t.input || {},
          result: t.result || t.output || '',
        };
      }) : [];
      // Attachments: user messages store image_path + file in meta;
      // assistant messages carry files produced by send_file tool.
      const _images = [];
      const _files = [];
      if (meta.image_path) _images.push(meta.image_path);
      if (Array.isArray(meta.images)) for (const u of meta.images) if (u) _images.push(u);
      if (meta.file) _files.push(meta.file);
      if (Array.isArray(meta.files)) for (const f of meta.files) if (f) _files.push(f);
      return {
        id: m.id || ('m-' + i),
        role: m.role,
        content: m.content || m.text || '',
        time: meta.ts || m.created_at || m.timestamp || Date.now(),
        thinking: meta.thinking || m.thinking || '',
        tools,
        _images,
        _files,
        _meta: meta,
      };
    });
    hydrateInspectorFromHistory();
    render(); scrollToBottom();
  } catch { state.messages = []; hydrateInspectorFromHistory(); render(); }
}

function hydrateInspectorFromHistory() {
  // Rebuild per-thread inspector stats from the loaded messages so F5 / thread
  // switch doesn't blank out the Last-turn / sparkbars / recalled sections.
  state.tokenTimeline = [];
  state.lastTurn = null;
  state.memoryPills = [];
  state.memoryPillsReal = false;  // live recall only arrives on fresh turns
  for (const m of state.messages) {
    const meta = m._meta || {};
    if (m.role !== 'assistant') continue;
    const tok = meta.tokens || 0;
    const prompt = meta.prompt_tokens || 0;
    // Mirror what `reply` WS event pushes live — sum of completion + prompt for timeline bar
    if (tok || prompt) state.tokenTimeline.push(tok || (m.content || '').length);
    state.lastTurn = {
      tokens: tok,
      prompt_tokens: prompt,
      duration_ms: meta.duration_ms || 0,
      tok_per_sec: meta.tok_per_sec || 0,
      context_hits: meta.context_hits || 0,
    };
  }
  if (state.tokenTimeline.length > 12) state.tokenTimeline = state.tokenTimeline.slice(-12);
}

async function switchThread(id) {
  if (state.activeThreadId === id) return;
  state.activeThreadId = id;
  state.threadlistOpen = false;  // close mobile drawer after pick
  // Clear per-thread UI state so the inspector doesn't flash the old thread's numbers
  state.messages = [];
  state.streaming = null;
  state.lastTurn = null;
  state.tokenTimeline = [];
  state.memoryPills = [];
  state.memoryPillsReal = false;
  state.kbRecallSessionTotal = 0;
  // Stop any previously running poll (from the thread we're leaving)
  if (state._routinePollTimer) {
    clearInterval(state._routinePollTimer);
    state._routinePollTimer = null;
  }
  render();
  try { await api('/api/threads/' + id + '/switch', { method: 'POST' }); } catch {}
  // Refresh the threads list — new active thread's est_tokens / message count shows in inspector
  await loadThreads();
  await loadActiveMessages();
  // If this is a routine thread, poll every 2s for both history (new
  // assistant replies land here when agent.run finishes) AND routine
  // state (firing=true/false refreshes the "Running…" badge + Run
  // button via patchThreadHeader). Backend agent.run runs headless —
  // poll is the only way to see progress.
  const t = state.threads.find(x => x.id === id);
  if (t && t.name && t.name.startsWith('Routine · ')) {
    // Initial fetch so the thread header has `routineJob` available on
    // the very first render (schedule line + Run button + running
    // badge). Without this the header renders as bare "ROUTINE" tag
    // for ~2s until the poll ticks in.
    await loadCron();
    // Then poll every 2s for new history + firing-state changes.
    state._routinePollTimer = setInterval(() => {
      if (state.activeThreadId !== id || state.view !== 'chat') return;
      loadActiveMessages({ silent: true }).catch(() => {});
      loadCron({ silent: true }).catch(() => {});
    }, 2000);
  }
}

async function newThread() {
  try {
    const r = await api('/api/threads', { method: 'POST', body: { name: 'New thread' } });
    const id = r.id || r.thread_id || (r.thread && r.thread.id);
    if (id) { await loadThreads(); await switchThread(id); }
  } catch { toast('create failed', 'err'); }
}

    if (s.provider || s.model) state.model = { provider: s.provider || '', model: s.model || '' };

async function fetchRecalledMemories(opts) {
  // WS 'recall' event is the source of truth — it contains what the agent
  // actually saw in the system prompt. Only run this fallback when no real
  // recall has arrived yet (e.g. a reload hit a thread with pre-WS history,
  // or the user clicked refresh manually) AND not forced by caller.
  const forced = opts && opts.force;
  if (state.memoryPillsReal && !forced) return;
  const lastUser = [...state.messages].reverse().find(m => m.role === 'user');
  if (!lastUser || !lastUser.content) return;
  const query = lastUser.content.slice(0, 200);
  try {
    const r = await api('/api/knowledge/search', { method: 'POST', body: { query, limit: 6 } });
    const results = (r && r.results) || [];
    state.memoryPills = results.map(x => ({
      relevance: typeof x.score === 'number' ? x.score : (x.relevance || 0.5),
      tag: (x.tags && x.tags[0]) || x.tag || 'memory',
      age: x.indexed_at ? fmtTime(x.indexed_at) : '',
      text: (x.text || x.content || x.name || '').slice(0, 200),
      source: 'knowledge_base',
    }));
    state.kbRecallSessionTotal = (state.kbRecallSessionTotal || 0) + state.memoryPills.length;
    state.memoryPillsReal = false;  // this is a KB preview, not the real recall
    if (opts && opts.silent) return;
    render();
  } catch {}
}

const KB_KINDS = {
  pdf:  { c: 'var(--err)',   icon: 'book',     label: 'PDF' },
  md:   { c: 'var(--info)',  icon: 'terminal', label: 'MD' },
  txt:  { c: 'var(--fg-3)',  icon: 'terminal', label: 'TXT' },
  docx: { c: 'var(--info)',  icon: 'book',     label: 'DOCX' },
  url:  { c: 'var(--ok)',    icon: 'globe',    label: 'URL' },
  note: { c: 'var(--warn)',  icon: 'edit',     label: 'NOTE' },
  code: { c: 'var(--magic)', icon: 'terminal', label: 'CODE' },
  json: { c: 'var(--warn)',  icon: 'terminal', label: 'JSON' },
  yaml: { c: 'var(--warn)',  icon: 'terminal', label: 'YAML' },
  csv:  { c: 'var(--ok)',    icon: 'terminal', label: 'CSV' },
  html: { c: 'var(--info)',  icon: 'globe',    label: 'HTML' },
};
const kbKindFor = (f) => {
  const p = (f.path || f.name || '').toLowerCase();
  if (p.startsWith('http://') || p.startsWith('https://')) return 'url';
  const ext = (p.match(/\.([a-z0-9]+)$/) || [])[1] || '';
  if (['pdf'].includes(ext)) return 'pdf';
  if (['md','markdown','mdx'].includes(ext)) return 'md';
  if (['docx','doc'].includes(ext)) return 'docx';
  if (['py','js','ts','tsx','jsx','go','rs','rb','java','c','cpp','h','hpp','cs','swift','php','sh'].includes(ext)) return 'code';
  if (['json'].includes(ext)) return 'json';
  if (['yaml','yml'].includes(ext)) return 'yaml';
  if (['csv','tsv'].includes(ext)) return 'csv';
  if (['html','htm'].includes(ext)) return 'html';
  return 'txt';
};
const humanSize = (n) => {
  if (!n && n !== 0) return '—';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/1024/1024).toFixed(1) + ' MB';
};

async function loadMemory() {
  loadKbRecent();  // fire-and-forget, updates the activity card
  try {
    const r = await api('/api/knowledge/list');
    const files = (r && r.files) || [];
    state.kbFiles = files.map(f => ({
      id: f.path || f.id || Math.random(),
      kind: kbKindFor(f),
      name: f.name || (f.path || '').split(/[\\/]/).pop() || '(unnamed)',
      path: f.path || '',
      sub: (f.tags || []).join(' · ') || f.path || '',
      chunks: f.chunks || f.chunk_count || 0,
      size: humanSize(f.size || f.bytes || 0),
      added: f.indexed_at ? fmtTime(f.indexed_at) : (f.added ? fmtTime(f.added) : ''),
      tags: f.tags || [],
    }));
    render();
  } catch { state.kbFiles = []; render(); }
  // Plain memories — what the Save-to-memory button writes. Lives
  // alongside the indexed knowledge sources. Phase 1 Living Memory
  // reads from the markdown layer (~/.qwe-qwe/memories/atoms/).
  try {
    const r = await api('/api/memory/list?limit=50');
    state.memoryEntries = (r && r.entries) || [];
    render();
  } catch { state.memoryEntries = []; render(); }
  try {
    const g = await api('/api/knowledge/graph');
    const nodes = (g && g.nodes) || [];
    const links = (g && g.links) || [];
    // Force-directed layout: repulsion + edge springs + gravity toward centre.
    // Replaces the old 3-ring radial layout which overlapped past ~30 nodes.
    const sorted = nodes.slice().sort((a, b) => (b.weight || 0) - (a.weight || 0));
    const placed = {};
    // Seed positions on a small circle (breaks the symmetry that crushes the
    // simulation when everyone starts on top of each other)
    const W = 200, H = 200, CX = W/2, CY = H/2;
    sorted.forEach((n, i) => {
      const a = (i / Math.max(1, sorted.length)) * Math.PI * 2;
      const r = 30 + Math.random() * 10;
      n.x = CX + Math.cos(a) * r;
      n.y = CY + Math.sin(a) * r;
      const typeColors = { person: 'var(--fg-2)', topic: 'var(--info)', project: 'var(--accent)', preference: 'var(--fg-3)', place: 'var(--ok)', event: 'var(--warn)' };
      n.color = typeColors[(n.type || '').toLowerCase()] || 'var(--magic)';
      placed[n.id] = n;
    });
    const validLinks = links.filter(l => placed[l.source] && placed[l.target]);
    // Run the simulation. Parameters tuned for 20–500 node graphs.
    runForceLayout(sorted, validLinks, { W, H });
    state.kbGraph = { nodes: sorted, links: validLinks, byId: placed };
    state.kbView = state.kbView || { tx: 0, ty: 0, zoom: 1 };  // pan/zoom
    render();
  } catch { state.kbGraph = { nodes: [], links: [], byId: {} }; render(); }
}

function runForceLayout(nodes, edges, opts) {
  if (!nodes.length) return;
  const { W = 200, H = 200 } = opts || {};
  const CX = W/2, CY = H/2;
  // Scale parameters with graph size so dense graphs don't squish
  const n = nodes.length;
  const ITERS = Math.min(500, 200 + n * 2);
  // Spring rest length: give edges more room when there are many of them
  const avgDeg = edges.length * 2 / Math.max(1, n);
  const SPRING_LEN = 18 + Math.min(14, avgDeg * 2);
  const SPRING_K = 0.04;
  const REPEL = 55 + Math.min(40, n * 0.3);  // stronger for more nodes
  const GRAVITY = 0.012;
  const DAMPING = 0.82;
  const MIN_D2 = 0.25;  // prevent division blow-up when nodes collide

  nodes.forEach(nd => { nd.vx = 0; nd.vy = 0; });
  // Resolve edge endpoints to node references once
  const es = edges.map(l => ({
    a: nodes.find(nd => nd.id === l.source),
    b: nodes.find(nd => nd.id === l.target),
  })).filter(e => e.a && e.b);

  for (let iter = 0; iter < ITERS; iter++) {
    // Cooling: later iterations make smaller adjustments
    const cool = 1 - (iter / ITERS) * 0.4;

    // Repulsion — O(n²), fine up to ~500 nodes
    for (let i = 0; i < nodes.length; i++) {
      const a = nodes[i];
      for (let j = i + 1; j < nodes.length; j++) {
        const b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        let d2 = dx*dx + dy*dy;
        if (d2 < MIN_D2) { d2 = MIN_D2; dx = (Math.random()-0.5)*0.5; dy = (Math.random()-0.5)*0.5; }
        const d = Math.sqrt(d2);
        const f = REPEL / d2;
        const fx = (dx/d) * f, fy = (dy/d) * f;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }
    // Spring attraction along edges
    for (const e of es) {
      const dx = e.b.x - e.a.x, dy = e.b.y - e.a.y;
      const d = Math.sqrt(dx*dx + dy*dy) + 0.01;
      const f = (d - SPRING_LEN) * SPRING_K;
      const fx = (dx/d) * f, fy = (dy/d) * f;
      e.a.vx += fx; e.a.vy += fy;
      e.b.vx -= fx; e.b.vy -= fy;
    }
    // Gravity + integrate
    for (const nd of nodes) {
      nd.vx += (CX - nd.x) * GRAVITY;
      nd.vy += (CY - nd.y) * GRAVITY;
      nd.vx *= DAMPING;
      nd.vy *= DAMPING;
      nd.x += nd.vx * cool;
      nd.y += nd.vy * cool;
    }
  }
  nodes.forEach(nd => { delete nd.vx; delete nd.vy; });
}

async function kbUploadBatch(files) {
  // 1) Upload each file in parallel → get stable paths
  const arr = Array.from(files);
  if (!arr.length) return;
  // If indexing is in progress, refuse to start a second run (server returns 409 anyway)
  if (state.kbStatus && state.kbStatus.status === 'running') {
    toast('indexing already running — wait for it to finish', 'err');
    return;
  }
  toast('uploading ' + arr.length + ' file' + (arr.length === 1 ? '' : 's') + '…');
  const uploaded = [];
  for (const f of arr) {
    try {
      const fd = new FormData(); fd.append('file', f);
      const r = await api('/api/knowledge/upload', { method: 'POST', body: fd });
      if (r && r.path) uploaded.push({ path: r.path, name: r.name || f.name });
      else toast('upload failed: ' + f.name, 'err');
    } catch (e) {
      toast('upload failed: ' + f.name, 'err');
    }
  }
  if (!uploaded.length) return;
  // 2) Kick off ONE background indexing run for all files
  try {
    await api('/api/knowledge/index', { method: 'POST', body: { files: uploaded, tags: [] } });
    toast('indexing ' + uploaded.length + ' file' + (uploaded.length === 1 ? '' : 's') + '…');
    pollKbStatus();
  } catch (e) {
    toast('could not start indexing: ' + (e.message || 'error'), 'err');
  }
}

async function pollKbStatus() {
  for (let i = 0; i < 180; i++) {
    try {
      const s = await api('/api/knowledge/status');
      state.kbStatus = s;
      render();
      if (!s || s.status !== 'running') break;
    } catch {}
    await new Promise(r => setTimeout(r, 1500));
  }
  const s = state.kbStatus || {};
  const errors = (s.errors || []).filter(Boolean);
  if (errors.length) {
    toast('indexing finished with ' + errors.length + ' error' + (errors.length === 1 ? '' : 's') + ' — see Memory view', 'err');
    console.warn('knowledge index errors:', errors);
  } else {
    toast('indexing done' + (s.total ? ' · ' + s.total + ' file' + (s.total === 1 ? '' : 's') : ''));
  }
  loadMemory();
  loadKbRecent();  // refresh the activity card
}

async function loadCron(opts) {
  opts = opts || {};
  try {
    const r = await api('/api/cron');
    const jobs = Array.isArray(r) ? r : (r.jobs || r.tasks || []);
    state.cronJobs = jobs.map(j => ({
      id: j.id, name: j.name || j.task || '(untitled)',
      cron: j.schedule || j.cron || '',
      task: j.task || '',
      repeat: !!j.repeat,
      status: j.enabled === false || j.paused ? 'paused' : 'active',
      next: j.next_run || j.next || '',
      lastRun: j.last_run || '',
      last: j.last || '',                 // pre-composed "ok · 42ms" / "err · Timeout"
      lastStatus: j.last_status || '',    // raw "ok"/"err"/"" for coloring
      lastDuration: j.last_duration_ms || 0,
      lastResult: j.last_result || '',
      runs: typeof j.run_count === 'number' ? j.run_count : (j.runs || 0),
      hits: j.recent || null,
      threadId: j.thread_id || '',        // permanent thread for this routine
      firing: !!j.firing,                  // agent.run currently executing
      // recent: last 20 fires by status (ok/err/missed/skipped) + series
      // of per-fire statuses oldest→newest for the sparkline render
      recent: j.recent || { counts: {}, series: [] },
    }));
    // Silent mode (routine-thread poll): surgically re-render just the
    // thread header so Composer textarea + scroll position don't reset
    // every 2s. Full render() would blow them away.
    if (opts.silent) patchThreadHeader();
    else render();
  } catch { state.cronJobs = []; if (!opts.silent) render(); }
  if (!opts.silent) {
    try {
      const t = await api('/api/tasks');
      state.runningTasks = t || { pending: 0, results: [] };
      render();
    } catch {}
  }
}

// Surgical thread-header swap — used by the routine-thread poll so the
// "Running…" badge + Run-button state update every 2s without a full
// render() that would wipe composer text + chat scroll.
function patchThreadHeader() {
  const old = document.querySelector('.thread-header');
  if (!old) return;
  const t = activeThread();
  const isRoutine = t && t.name && t.name.startsWith('Routine · ');
  if (!isRoutine) return;
  const charCount = state.messages.reduce((n, m) => n + (m.content || '').length, 0);
  const routineJob = (state.cronJobs || []).find(j => j.threadId === t.id);
  const paused = routineJob && (routineJob.status === 'paused' || routineJob.enabled === false);
  const pauseBtn = routineJob
    ? '<button class="btn-secondary" data-act="routine-toggle" data-routine-id="' + esc(routineJob.id) + '" title="' + (paused ? 'Resume this routine' : 'Pause — scheduler will skip firings') + '" style="display:inline-flex;align-items:center;gap:6px">' +
        ico(paused ? 'play' : 'pause', 11) + (paused ? 'Resume' : 'Pause') + '</button>'
    : '';
  const runBtn = routineJob
    ? (routineJob.firing
        ? '<button class="btn-secondary" disabled style="display:inline-flex;align-items:center;gap:6px;opacity:0.6">' +
            '<span class="spinner" style="width:10px;height:10px;border:2px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;animation:kb-spin 0.8s linear infinite;display:inline-block"></span>' +
            'Running…</button>'
        : (paused
            ? ''
            : '<button class="btn-secondary" data-act="routine-run-now" data-routine-id="' + esc(routineJob.id) + '" style="display:inline-flex;align-items:center;gap:6px">' +
                ico('play', 11) + 'Run now</button>'))
    : '';
  const routineCtrls = routineJob
    ? '<span style="margin-left:auto;display:flex;gap:6px">' + pauseBtn + runBtn + '</span>'
    : '';
  const routineBadge = routineJob
    ? (routineJob.firing
        ? '<span class="status-badge warn" style="margin-left:8px"><span class="sbdot"></span>running</span>'
        : (paused
            ? '<span class="status-badge" style="margin-left:8px"><span class="sbdot"></span>paused</span>'
            : (routineJob.lastStatus === 'err'
                ? '<span class="status-badge err" style="margin-left:8px"><span class="sbdot"></span>last run failed</span>'
                : '<span class="status-badge ok" style="margin-left:8px"><span class="sbdot"></span>active</span>')))
    : '';
  const headerHtml =
    '<div class="thread-header"><div class="meta-row" style="display:flex;align-items:center;flex-wrap:wrap;gap:6px"><span class="tag">routine</span>' +
    routineBadge +
    '<span class="meta">' + esc(fmtTime(t.created_at)) + ' · ' + state.messages.length + ' messages · ~' + Math.round(charCount/4).toLocaleString() + ' tokens</span>' +
    routineCtrls + '</div>' +
    '<h1>' + esc(t.name || 'New thread') + '</h1>' +
    (routineJob
      ? '<p class="sub" style="margin-top:4px;font-size:12px;color:var(--fg-4);font-family:var(--font-mono)">' +
          esc(routineJob.cron) + ' · ' +
          (routineJob.runs || 0) + ' run' + (routineJob.runs === 1 ? '' : 's') +
          (routineJob.last ? ' · last ' + esc(routineJob.last) : '') +
          ' · next ' + esc(routineJob.next || '—') +
        '</p>'
      : '') +
    '</div>';
  const tmp = document.createElement('div');
  tmp.innerHTML = headerHtml;
  const next = tmp.firstElementChild;
  if (next) {
    old.replaceWith(next);
    // Rewire interactive buttons on the new node (wireEvents skipped
    // because we went through the silent-poll path).
    next.querySelectorAll('[data-act="routine-run-now"]').forEach(b => {
      b.onclick = async () => {
        const rid = b.dataset.routineId;
        if (!rid) return;
        try {
          const r = await api('/api/cron/' + rid + '/run', { method: 'POST' });
          if (r && r.already_running) toast(r.hint || 'already running', 'warn');
          else toast('routine firing…');
          setTimeout(() => loadActiveMessages({ silent: true }), 400);
        } catch { toast('run failed', 'err'); }
      };
    });
    next.querySelectorAll('[data-act="routine-toggle"]').forEach(b => {
      b.onclick = async () => {
        const rid = b.dataset.routineId;
        if (!rid) return;
        try {
          const r = await api('/api/cron/' + rid + '/toggle', { method: 'POST' });
          toast(r && r.enabled ? 'resumed' : 'paused');
          await loadCron();  // full refresh rebuilds header with the new state
        } catch { toast('toggle failed', 'err'); }
      };
    });
  }
}

function openNewCronModal() {
  // Schedule DSL understood by scheduler._parse_schedule:
  //   in 5m / in 2h            — one-off relative
  //   every 30m / every 2h     — repeat every N units
  //   daily HH:MM              — every day at that time
  //   HH:MM                    — one-off today/tomorrow at that time
  // The UI here exposes a "Frequency" dropdown mapped to those formats.
  const body =
    '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line-2);margin-bottom:16px;font-size:12px;color:var(--fg-3)">' +
      ico('shield', 13) + '<span>Local routines only run while your computer is awake.</span>' +
    '</div>' +
    '<div class="field"><div class="label">Name <span style="color:var(--err)">*</span></div>' +
      '<input type="text" id="cr-name" placeholder="daily-code-review" autofocus></div>' +
    '<div class="field"><div class="label">Description <span style="color:var(--err)">*</span></div>' +
      '<input type="text" id="cr-desc" placeholder="Review yesterday\'s commits and flag anything concerning"></div>' +
    '<div class="field"><div class="label">Task prompt</div>' +
      '<textarea id="cr-task" rows="5" placeholder="Long-form instructions for the agent. Paths, tools, and expected final output if it matters. e.g. &#10;&#10;Look at the commits from the last 24 hours. Summarise what changed, call out any risky patterns or missing tests, and note anything worth following up on."></textarea></div>' +
    '<div class="field"><div class="label">Frequency</div>' +
      // Mode dropdown — picks the family of schedule. Each mode shows
      // different sub-controls below (day chips for Weekly, N input for
      // Every, time picker for time-anchored modes).
      '<select class="setting-input mono" id="cr-freq" style="margin-bottom:10px">' +
        '<option value="daily">Daily</option>' +
        '<option value="weekly">Weekly (pick days)</option>' +
        '<option value="every-days">Every N days</option>' +
        '<option value="every-hours">Every N hours</option>' +
        '<option value="every-mins">Every N minutes</option>' +
        '<option value="once">Once (today/tomorrow)</option>' +
        '<option value="custom">Custom (raw DSL)</option>' +
      '</select>' +
      // Sub-controls containers — shown/hidden based on mode.
      '<div id="cr-sub-time" style="display:flex;align-items:center;gap:10px">' +
        '<span style="font-size:12px;color:var(--fg-3);min-width:50px">at</span>' +
        '<input type="time" id="cr-time" class="mono" value="09:00" style="width:120px">' +
      '</div>' +
      '<div id="cr-sub-weekly" style="display:none">' +
        '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px" id="cr-day-chips">' +
          ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d, i) =>
            '<button type="button" class="chip" data-day="' + i + '">' + d + '</button>'
          ).join('') +
        '</div>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;font-size:11px">' +
          '<button type="button" class="chip" data-dayset="weekdays">Weekdays</button>' +
          '<button type="button" class="chip" data-dayset="weekends">Weekends</button>' +
          '<button type="button" class="chip" data-dayset="all">All</button>' +
          '<button type="button" class="chip" data-dayset="clear">Clear</button>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          '<span style="font-size:12px;color:var(--fg-3);min-width:50px">at</span>' +
          '<input type="time" id="cr-time-weekly" class="mono" value="09:00" style="width:120px">' +
        '</div>' +
      '</div>' +
      '<div id="cr-sub-every-days" style="display:none;align-items:center;gap:10px">' +
        '<span style="font-size:12px;color:var(--fg-3)">every</span>' +
        '<input type="number" id="cr-n-days" class="mono" value="2" min="1" max="90" style="width:70px">' +
        '<span style="font-size:12px;color:var(--fg-3)">days at</span>' +
        '<input type="time" id="cr-time-days" class="mono" value="09:00" style="width:120px">' +
      '</div>' +
      '<div id="cr-sub-every-hours" style="display:none;align-items:center;gap:10px">' +
        '<span style="font-size:12px;color:var(--fg-3)">every</span>' +
        '<input type="number" id="cr-n-hours" class="mono" value="2" min="1" max="48" style="width:70px">' +
        '<span style="font-size:12px;color:var(--fg-3)">hours</span>' +
      '</div>' +
      '<div id="cr-sub-every-mins" style="display:none;align-items:center;gap:10px">' +
        '<span style="font-size:12px;color:var(--fg-3)">every</span>' +
        '<input type="number" id="cr-n-mins" class="mono" value="30" min="1" max="1440" style="width:70px">' +
        '<span style="font-size:12px;color:var(--fg-3)">minutes</span>' +
      '</div>' +
      '<input type="text" id="cr-custom" class="mono" placeholder="e.g. every 90m, weekdays 08:30, every 2 days 14:00" style="display:none;width:100%">' +
      '<div class="hint" id="cr-schedule-preview" style="margin-top:10px;font-family:var(--font-mono);color:var(--fg-4)">= daily 09:00</div>' +
    '</div>' +
    '<div class="hint" style="font-size:11px;color:var(--fg-5);margin-top:-4px">Creates a chat thread with the task as the first message. The agent only runs when the schedule fires (or when you click <span class="mono">Run now</span> on the routine card).</div>';
  // Frequency picker state → raw scheduler DSL.
  // ``opts`` collects every sub-control's value (time, selected days,
  // N for every-N-days/hours/mins, custom text). The mode dropdown
  // decides which fields are meaningful.
  const DAY_SHORT = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
  const freqToDSL = (freq, opts) => {
    const time = opts.time || '09:00';
    if (freq === 'custom') return (opts.custom || '').trim();
    if (freq === 'daily') return 'daily ' + time;
    if (freq === 'weekly') {
      const days = (opts.days || []).slice().sort();
      if (!days.length) return '';  // user must pick at least one day
      // Prefer human aliases so the DSL is readable in the card label.
      if (days.length === 5 && days.every((d, i) => d === i)) return 'weekdays ' + time;
      if (days.length === 2 && days[0] === 5 && days[1] === 6) return 'weekends ' + time;
      return days.map(d => DAY_SHORT[d]).join(',') + ' ' + time;
    }
    if (freq === 'every-days') return 'every ' + (opts.nDays || 1) + ' days ' + time;
    if (freq === 'every-hours') return 'every ' + (opts.nHours || 1) + 'h';
    if (freq === 'every-mins') return 'every ' + (opts.nMins || 1) + 'm';
    if (freq === 'once') return time;
    return '';
  };

  openModal({
    title: 'New routine',
    body,
    wide: true,
    actions: [
      { label: 'Cancel' },
      { label: 'Create', primary: true, busyLabel: 'Creating…', onClick: async () => {
          const name = document.getElementById('cr-name').value.trim();
          const desc = document.getElementById('cr-desc').value.trim();
          const task = document.getElementById('cr-task').value.trim();
          const freq = document.getElementById('cr-freq').value;
          const opts = {
            time: (freq === 'weekly'
                    ? document.getElementById('cr-time-weekly').value
                    : freq === 'every-days'
                      ? document.getElementById('cr-time-days').value
                      : document.getElementById('cr-time').value),
            days: Array.from(document.querySelectorAll('#cr-day-chips [data-day].active'))
                       .map(el => parseInt(el.dataset.day, 10)),
            nDays: parseInt(document.getElementById('cr-n-days').value || '1', 10),
            nHours: parseInt(document.getElementById('cr-n-hours').value || '1', 10),
            nMins: parseInt(document.getElementById('cr-n-mins').value || '1', 10),
            custom: document.getElementById('cr-custom').value,
          };
          const schedule = freqToDSL(freq, opts);

          if (!name) { toast('name is required', 'err'); return false; }
          if (!desc) { toast('description is required', 'err'); return false; }
          if (!schedule) {
            if (freq === 'weekly' && !opts.days.length) toast('pick at least one weekday', 'err');
            else toast('frequency is required', 'err');
            return false;
          }
          // Fall back to description if no long task prompt — matches UI
          // semantics of "description = one-liner, task prompt = details".
          const finalTask = task || desc;

          // Routines are chats-with-schedule. Never dry-run on create —
          // instant save, then auto-navigate into the thread where the
          // user can iterate / "Run now" / chat through breakage.
          let r;
          try { r = await api('/api/cron', { method: 'POST', body: { name, schedule, task: finalTask, skip_dry_run: true } }); }
          catch { toast('create failed — server error', 'err'); return false; }
          if (r && r.error) {
            // Without dry-run the only failures left here are parse errors.
            toast(r.error, 'err');
            return false;
          }
          toast('routine created · next fire: ' + (r.next_run || '?'));
          loadCron();
          // The new routine's thread needs to appear in the sidebar, and
          // we want to deposit the user straight into it so they can see
          // the task prompt and iterate.
          await loadThreads({ silent: true });
          if (r.thread_id) {
            try { await switchThread(r.thread_id); go('chat'); }
            catch { /* fall through to scheduler view */ }
          }
      }},
    ],
  });
  // Wire sub-control visibility, day-chip toggle, and live DSL preview.
  setTimeout(() => {
    const freqEl = document.getElementById('cr-freq');
    const preview = document.getElementById('cr-schedule-preview');
    const customEl = document.getElementById('cr-custom');
    const chipContainer = document.getElementById('cr-day-chips');

    // Map mode → which sub-control container is visible
    const subContainers = {
      daily:         'cr-sub-time',
      weekly:        'cr-sub-weekly',
      'every-days':  'cr-sub-every-days',
      'every-hours': 'cr-sub-every-hours',
      'every-mins':  'cr-sub-every-mins',
      once:          'cr-sub-time',
      custom:        null,  // custom field is separate (always visible when mode=custom)
    };

    const collectOpts = () => ({
      time: (freqEl.value === 'weekly'
              ? document.getElementById('cr-time-weekly').value
              : freqEl.value === 'every-days'
                ? document.getElementById('cr-time-days').value
                : document.getElementById('cr-time').value),
      days: Array.from(chipContainer.querySelectorAll('[data-day].active'))
                 .map(el => parseInt(el.dataset.day, 10)),
      nDays: parseInt(document.getElementById('cr-n-days').value || '1', 10),
      nHours: parseInt(document.getElementById('cr-n-hours').value || '1', 10),
      nMins: parseInt(document.getElementById('cr-n-mins').value || '1', 10),
      custom: customEl.value,
    });

    const refresh = () => {
      const mode = freqEl.value;
      // Show/hide sub-containers
      Object.values(subContainers).forEach(id => {
        if (!id) return;
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const activeSubId = subContainers[mode];
      if (activeSubId) {
        const el = document.getElementById(activeSubId);
        if (el) el.style.display = (mode === 'weekly' ? 'block' : 'flex');
      }
      customEl.style.display = (mode === 'custom') ? '' : 'none';
      const dsl = freqToDSL(mode, collectOpts());
      if (preview) preview.textContent = '= ' + (dsl || '(pick at least one day)');
    };

    if (freqEl) freqEl.onchange = refresh;
    // Wire every sub-control that can change the DSL
    ['cr-time', 'cr-time-weekly', 'cr-time-days', 'cr-n-days',
     'cr-n-hours', 'cr-n-mins', 'cr-custom'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.oninput = refresh;
    });
    // Day chips — toggle individual
    chipContainer.querySelectorAll('[data-day]').forEach(ch => {
      ch.onclick = (e) => { e.preventDefault(); ch.classList.toggle('active'); refresh(); };
    });
    // Day-set quick buttons (Weekdays / Weekends / All / Clear)
    document.querySelectorAll('[data-dayset]').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        const set = btn.dataset.dayset;
        const chips = chipContainer.querySelectorAll('[data-day]');
        chips.forEach((c, i) => {
          if (set === 'weekdays') c.classList.toggle('active', i < 5);
          else if (set === 'weekends') c.classList.toggle('active', i >= 5);
          else if (set === 'all') c.classList.add('active');
          else if (set === 'clear') c.classList.remove('active');
        });
        refresh();
      };
    });

    // Initial: default to weekdays pre-selected when someone switches to weekly.
    // Leave unchecked on first render — user has to click days explicitly so
    // we don't silently create a schedule they didn't intend.
    refresh();
  }, 40);
}

async function loadPresets() {
  try {
    const r = await api('/api/presets');
    // server returns {items: [...], active: "<id>"}
    const list = (r && r.items) || (r && r.presets) || (Array.isArray(r) ? r : []);
    const activeId = r && r.active;
    state.presetList = (list || []).map(p => ({ ...p, active: p.id === activeId || !!p.active }));
    render();
  } catch { state.presetList = []; render(); }
}

function render() {
  const root = document.getElementById('app');
  // Preserve scroll position of the chat scroller across re-renders.
  // Stick to bottom whenever the user isn't deliberately scrolled up, OR whenever
  // a turn is being generated (state.busy / state.streaming). This prevents the
  // chat from "snapping to the first message" when a reply lands after rapid streaming.
  let savedScroll = null;
  const prevCol = document.getElementById('chat-scroll');
  if (prevCol) {
    const distToBottom = prevCol.scrollHeight - prevCol.scrollTop - prevCol.clientHeight;
    const userEngaged = distToBottom > 400 && !state.busy && !state.streaming && !state.userStickTop;
    savedScroll = {
      top: prevCol.scrollTop,
      stickBottom: !userEngaged,   // default: stick to bottom
    };
  }
  root.className = state.anim ? '' : 'no-anim';
  root.innerHTML =
    '<div class="shell">' +
      renderRail() +
      '<main class="canvas">' +
        renderTopBar() +
        '<div class="work">' +
          (state.view === 'chat' ? renderThreadList() : '') +
          (state.view === 'chat' && state.threadlistOpen
            ? '<div class="threadlist-backdrop" data-act="close-threadlist"></div>'
            : '') +
          '<div class="view">' + renderViewBody() + '</div>' +
          (state.view === 'chat' && state.inspectorOn ? renderInspector() : '') +
        '</div>' +
      '</main>' +
      (state.paletteOpen ? renderPalette() : '') +
      (state.modal ? renderModal() : '') +
      (state.cameraOn ? renderCameraPip() : '') +
    '</div>';
  wireEvents();
  wireModal();
  // Restore scroll position (or stick to bottom) on the new scroll container
  if (savedScroll) {
    requestAnimationFrame(() => {
      const col = document.getElementById('chat-scroll');
      if (!col) return;
      col.scrollTop = savedScroll.stickBottom ? col.scrollHeight : savedScroll.top;
    });
  }
}
