<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qwe-qwe</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --text-dim: #666;
  --accent: #f5a623;
  --accent-dim: #a06e15;
  --user-bg: #1a1a2e;
  --agent-bg: #141414;
  --error: #e74c3c;
  --green: #27ae60;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Tab bar (Chrome-style) ── */
.tab-bar {
  display: flex;
  align-items: flex-end;
  background: #0e0e0e;
  padding: 0 8px;
  gap: 0;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  min-height: 38px;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-size: 12px;
  color: var(--text-dim);
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  white-space: nowrap;
  max-width: 180px;
  min-width: 0;
  position: relative;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
  user-select: none;
}
.tab:hover { background: var(--surface2); color: var(--text); }
.tab.active {
  background: var(--bg);
  color: var(--text);
  border-color: var(--border);
}
.tab-name {
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--sans);
}
.tab-msgs {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--mono);
  flex-shrink: 0;
}
.tab-close {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.1s, background 0.1s;
}
.tab:hover .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.tab-new {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  margin: 0 4px;
  border-radius: 6px;
  font-size: 16px;
  color: var(--text-dim);
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
  align-self: center;
}
.tab-new:hover { background: var(--surface2); color: var(--accent); }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 18px; font-weight: 700; color: var(--accent); font-family: var(--mono); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--error);
  transition: background 0.3s;
}
.status-dot.connected { background: var(--green); }
.header-right { display: flex; align-items: center; gap: 16px; }
.stat { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
.stat b { color: var(--text); }

/* Chat area */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 6px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Messages */
.msg {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 14px;
  position: relative;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.user {
  background: var(--user-bg);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
  border: 1px solid #2a2a4e;
}
.msg.assistant {
  background: var(--agent-bg);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}
.msg.error {
  background: #2d1515;
  border: 1px solid var(--error);
  align-self: center;
  color: var(--error);
  font-size: 13px;
}
.msg.status {
  align-self: center;
  color: var(--text-dim);
  font-size: 12px;
  padding: 4px 12px;
  background: transparent;
  font-family: var(--mono);
}
.msg-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
  font-family: var(--mono);
}
.msg-meta .tool-tag {
  display: inline-block;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  margin-right: 4px;
  font-size: 10px;
}

/* Markdown in messages */
.msg pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin: 8px 0;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 13px;
}
.msg code {
  background: var(--surface2);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 13px;
}
.msg pre code { background: transparent; padding: 0; }
.msg p { margin: 4px 0; }
.msg ul, .msg ol { padding-left: 20px; margin: 4px 0; }
.msg a { color: var(--accent); text-decoration: none; }
.msg a:hover { text-decoration: underline; }
.msg strong { color: #fff; }
.msg h1, .msg h2, .msg h3 { color: var(--accent); margin: 8px 0 4px; }
.msg h1 { font-size: 16px; } .msg h2 { font-size: 15px; } .msg h3 { font-size: 14px; }
.msg blockquote {
  border-left: 3px solid var(--accent-dim);
  padding-left: 12px;
  margin: 6px 0;
  color: var(--text-dim);
}

/* Input */
.input-area {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
#input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 44px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
#input:focus { border-color: var(--accent); }
#input::placeholder { color: var(--text-dim); }
#send {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 12px 20px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition: opacity 0.2s;
  white-space: nowrap;
}
#send:hover { opacity: 0.85; }
#send:disabled { opacity: 0.4; cursor: not-allowed; }

/* Sidebar */
.sidebar {
  position: fixed;
  right: -320px;
  top: 0;
  width: 320px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  transition: right 0.3s ease;
  z-index: 100;
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow-y: auto;
}
.sidebar.open { right: 0; }
.sidebar h3 { color: var(--accent); margin-bottom: 12px; font-size: 14px; }
.sidebar-section { margin-bottom: 20px; }
.sidebar-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.sidebar-value { font-family: var(--mono); font-size: 13px; }
.soul-slider {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
  font-size: 12px;
}
.soul-slider label { width: 80px; color: var(--text-dim); }
.soul-slider input[type=range] {
  flex: 1;
  accent-color: var(--accent);
  height: 4px;
}
.soul-slider .val { width: 20px; text-align: right; font-family: var(--mono); color: var(--accent); }

.btn-settings {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
.btn-settings:hover { border-color: var(--accent); color: var(--accent); }

/* Empty state */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 8px;
}
.empty-logo { font-size: 48px; font-weight: 700; color: var(--accent); font-family: var(--mono); opacity: 0.3; }
.empty-text { font-size: 14px; }

/* Tab rename inline edit */
.tab-rename {
  background: var(--surface2);
  border: 1px solid var(--accent);
  color: var(--text);
  font-size: 12px;
  font-family: var(--sans);
  padding: 2px 6px;
  border-radius: 3px;
  outline: none;
  width: 100px;
}

/* Mobile */
@media (max-width: 640px) {
  .msg { max-width: 95%; }
  .header-right .stat { display: none; }
  #input { font-size: 16px; }
  .tab { max-width: 120px; padding: 6px 10px; }
  .tab-msgs { display: none; }
}
</style>
</head>
<body>

<!-- Tab bar -->
<div class="tab-bar" id="tabBar">
  <!-- tabs rendered dynamically -->
  <div class="tab-new" onclick="createThread()" title="New thread">+</div>
</div>

<div class="header">
  <div class="header-left">
    <div class="status-dot" id="statusDot"></div>
    <div class="logo">qwe-qwe</div>
  </div>
  <div class="header-right">
    <span class="stat" id="statTokens"></span>
    <span class="stat" id="statMemory"></span>
    <button class="btn-settings" onclick="toggleSidebar()">⚙</button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="message..." rows="1"></textarea>
    <button id="send" onclick="send()">Send</button>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <h3>⚡ Settings</h3>
  <div class="sidebar-section">
    <div class="sidebar-label">Agent</div>
    <div class="sidebar-value" id="sidebarAgent">—</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Model</div>
    <div class="sidebar-value" id="sidebarModel">—</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Skills</div>
    <div class="sidebar-value" id="sidebarSkills">—</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Soul</div>
    <div id="soulSliders"></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Logs</div>
    <button class="btn-settings" onclick="showLogs()">View logs</button>
    <button class="btn-settings" onclick="showLogs('errors')">Errors only</button>
  </div>
</div>

<script>
// ── State ──
let ws = null;
let reconnectTimer = null;
let activeThreadId = null;
let threadsList = [];

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const tabBar = document.getElementById('tabBar');

// ── WebSocket ──
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('statusDot').classList.add('connected');
    clearTimeout(reconnectTimer);
    loadThreads();
    loadStatus();
  };

  ws.onclose = () => {
    document.getElementById('statusDot').classList.remove('connected');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    removeStatus();

    if (data.type === 'reply') {
      addMessage('assistant', data.text, data);
      sendBtn.disabled = false;
      input.focus();
      // Update tab message count
      loadThreads();
    } else if (data.type === 'error') {
      addMessage('error', data.text);
      sendBtn.disabled = false;
    } else if (data.type === 'status') {
      showStatus(data.text);
    }
  };
}

// ── Threads / Tabs ──
async function loadThreads() {
  try {
    const res = await fetch('/api/threads');
    threadsList = await res.json();

    // Find active
    const active = threadsList.find(t => t.active);
    if (active && !activeThreadId) {
      activeThreadId = active.id;
    }

    renderTabs();

    // Load history for active thread
    if (activeThreadId) {
      loadHistory(activeThreadId);
    }
  } catch (e) {
    console.error('Failed to load threads:', e);
  }
}

function renderTabs() {
  // Remove existing tabs (keep the + button)
  const newBtn = tabBar.querySelector('.tab-new');
  tabBar.innerHTML = '';

  for (const t of threadsList) {
    const tab = document.createElement('div');
    tab.className = `tab${t.id === activeThreadId ? ' active' : ''}`;
    tab.dataset.id = t.id;

    const name = document.createElement('span');
    name.className = 'tab-name';
    name.textContent = t.name;
    tab.appendChild(name);

    if (t.messages > 0) {
      const msgs = document.createElement('span');
      msgs.className = 'tab-msgs';
      msgs.textContent = t.messages;
      tab.appendChild(msgs);
    }

    // Close button (not for default if it's the only one)
    if (t.id !== 'default' || threadsList.length > 1) {
      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '×';
      close.onclick = (e) => { e.stopPropagation(); closeThread(t.id, t.name); };
      tab.appendChild(close);
    }

    // Click to switch
    tab.onclick = () => switchThread(t.id);

    // Double-click to rename
    tab.ondblclick = (e) => {
      e.preventDefault();
      startRename(tab, t.id, t.name);
    };

    tabBar.appendChild(tab);
  }

  tabBar.appendChild(newBtn);
}

async function switchThread(tid) {
  if (tid === activeThreadId) return;

  try {
    await fetch(`/api/threads/${tid}/switch`, { method: 'POST' });
    activeThreadId = tid;
    renderTabs();
    loadHistory(tid);
  } catch (e) {
    console.error('Failed to switch thread:', e);
  }
}

async function createThread() {
  // Prompt for name
  const name = prompt('Thread name:', `Thread ${threadsList.length + 1}`);
  if (!name) return;

  try {
    const res = await fetch('/api/threads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const t = await res.json();

    // Switch to new thread
    await fetch(`/api/threads/${t.id}/switch`, { method: 'POST' });
    activeThreadId = t.id;
    await loadThreads();
    input.focus();
  } catch (e) {
    console.error('Failed to create thread:', e);
  }
}

async function closeThread(tid, name) {
  if (!confirm(`Close "${name}"?\nThis will archive the thread.`)) return;

  try {
    // Archive (not delete — safer)
    await fetch(`/api/threads/${tid}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ archived: true }),
    });

    // If closing active, switch to first available
    if (tid === activeThreadId) {
      activeThreadId = null;
    }
    await loadThreads();

    // Auto-switch to first thread
    if (!activeThreadId && threadsList.length > 0) {
      await switchThread(threadsList[0].id);
    }
  } catch (e) {
    console.error('Failed to close thread:', e);
  }
}

function startRename(tabEl, tid, currentName) {
  const nameEl = tabEl.querySelector('.tab-name');
  const inp = document.createElement('input');
  inp.className = 'tab-rename';
  inp.value = currentName;
  nameEl.replaceWith(inp);
  inp.focus();
  inp.select();

  const finish = async () => {
    const newName = inp.value.trim() || currentName;
    if (newName !== currentName) {
      try {
        await fetch(`/api/threads/${tid}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName }),
        });
      } catch (e) { console.error(e); }
    }
    await loadThreads();
  };

  inp.onblur = finish;
  inp.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = currentName; inp.blur(); }
  };
}

// ── Messages ──
function addMessage(role, text, meta) {
  const empty = chat.querySelector('.empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = renderMarkdown(text);

  if (meta && role === 'assistant') {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'msg-meta';
    let parts = [];
    if (meta.duration_ms) parts.push(`${meta.duration_ms}ms`);
    if (meta.tools && meta.tools.length) {
      parts.push(meta.tools.map(t => `<span class="tool-tag">🔧 ${t}</span>`).join(''));
    }
    if (meta.context_hits) parts.push(`📎 ${meta.context_hits} memories`);
    metaDiv.innerHTML = parts.join(' · ');
    div.appendChild(metaDiv);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showStatus(text) {
  removeStatus();
  const div = document.createElement('div');
  div.className = 'msg status';
  div.id = 'statusMsg';
  div.textContent = `⏳ ${text}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeStatus() {
  const el = document.getElementById('statusMsg');
  if (el) el.remove();
}

// ── Send (with thread_id) ──
function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  addMessage('user', text);
  ws.send(JSON.stringify({ text, thread_id: activeThreadId }));
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
}

// ── Input handling ──
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ── Load history for a thread ──
async function loadHistory(threadId) {
  try {
    const tid = threadId || activeThreadId || 'default';
    const res = await fetch(`/api/history?limit=30&thread_id=${tid}`);
    const msgs = await res.json();
    chat.innerHTML = '';
    if (msgs.length === 0) {
      chat.innerHTML = '<div class="empty"><div class="empty-logo">⚡</div><div class="empty-text">start chatting</div></div>';
      return;
    }
    msgs.forEach(m => addMessage(m.role, m.content));
    chat.scrollTop = chat.scrollHeight;
  } catch (e) {
    console.error('Failed to load history:', e);
  }
}

// ── Load status ──
async function loadStatus() {
  try {
    const res = await fetch('/api/status');
    const s = await res.json();
    document.getElementById('statTokens').innerHTML = `<b>${s.turns}</b> turns`;
    document.getElementById('statMemory').innerHTML = `<b>${s.memories}</b> memories`;
    document.getElementById('sidebarAgent').textContent = s.agent;
    document.getElementById('sidebarModel').textContent = s.model;
    document.getElementById('sidebarSkills').textContent = s.skills.join(', ') || 'none';

    // Soul sliders
    const container = document.getElementById('soulSliders');
    container.innerHTML = '';
    for (const [trait, value] of Object.entries(s.soul)) {
      const row = document.createElement('div');
      row.className = 'soul-slider';
      row.innerHTML = `
        <label>${trait}</label>
        <input type="range" min="0" max="10" value="${value}"
               oninput="this.nextElementSibling.textContent=this.value"
               onchange="updateSoul('${trait}', this.value)">
        <span class="val">${value}</span>
      `;
      container.appendChild(row);
    }
  } catch (e) {
    console.error('Failed to load status:', e);
  }
}

// ── Soul update ──
async function updateSoul(trait, value) {
  try {
    await fetch('/api/soul', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [trait]: parseInt(value) }),
    });
  } catch (e) {
    console.error('Failed to update soul:', e);
  }
}

// ── Sidebar ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('sidebar');
  const btn = document.querySelector('.btn-settings');
  if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== btn) {
    sidebar.classList.remove('open');
  }
});

// ── Logs viewer ──
async function showLogs(type) {
  const file = type === 'errors' ? 'errors.log' : 'qwe-qwe.log';
  try {
    const res = await fetch(`/api/logs?file=${file}&lines=40`);
    const data = await res.json();
    const text = data.lines.join('\n') || '(empty)';
    addMessage('assistant', '```\n' + text + '\n```');
  } catch (e) {
    addMessage('error', 'Failed to load logs');
  }
}

// ── Simple markdown renderer ──
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/([^>])\n([^<])/g, '$1<br>$2');
  return `<p>${html}</p>`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  // Ctrl+T — new thread
  if ((e.ctrlKey || e.metaKey) && e.key === 't') {
    // Don't hijack if browser handles it, but try
    // e.preventDefault(); // commented out — let browser handle
    // createThread();
  }
  // Ctrl+Tab / Ctrl+Shift+Tab — switch threads
  // (browsers intercept these, so we use Alt instead)
  if (e.altKey && e.key === 'ArrowRight') {
    e.preventDefault();
    switchToNextThread(1);
  }
  if (e.altKey && e.key === 'ArrowLeft') {
    e.preventDefault();
    switchToNextThread(-1);
  }
});

function switchToNextThread(direction) {
  const idx = threadsList.findIndex(t => t.id === activeThreadId);
  if (idx === -1) return;
  const next = (idx + direction + threadsList.length) % threadsList.length;
  switchThread(threadsList[next].id);
}

// ── Init ──
connect();
input.focus();
</script>
