function renderTabTools() {
  const skills = state.skills || [];
  const st = state.status || {};
  // Ground-truth list from /api/status.core_tools (what tools.TOOLS actually exposes)
  const realCore = Array.isArray(st.core_tools) ? st.core_tools : [];
  const CORE_DESCRIPTIONS = {
    memory_search: 'Semantic search over stored memories.',
    memory_save: 'Write new memories from the current thread.',
    memory_delete: 'Delete a memory by ID.',
    shell: 'Execute shell commands in the workspace.',
    read_file: 'Read a local file into context.',
    write_file: 'Create or overwrite a local file.',
    send_file: 'Queue a file to attach to the current reply.',
    camera_capture: 'Grab a frame and run vision analysis.',
    open_url: 'Open a URL in the desktop browser.',
    schedule_task: 'Schedule a task to run later or on a cron expression.',
    list_cron: 'List scheduled cron tasks.',
    remove_cron: 'Remove a scheduled task by ID.',
    switch_model: 'Switch to a different LLM model / provider.',
    spawn_task: 'Run a task in the background.',
    secret_save: 'Store an encrypted secret in the vault.',
    secret_get: 'Read a decrypted secret.',
    secret_list: 'List stored secret keys (values hidden).',
    secret_delete: 'Delete a secret from the vault.',
    user_profile_update: "Update a key in the user's persistent profile.",
    user_profile_get: "Read the user's profile.",
    http_request: 'Fetch a URL and return cleaned text.',
    rag_index: 'Index a file into the RAG knowledge base.',
    rag_search: 'Search the RAG knowledge base.',
    rag_status: 'Show RAG knowledge-base stats.',
    self_config: 'Agent self-configuration (name, language, soul, heartbeat).',
    tool_search: 'Discover + activate more tools by keyword (meta-tool).',
  };
  const colorFor = (n) => {
    if (n.startsWith('memory_')) return 'var(--magic)';
    if (n.startsWith('rag_')) return 'var(--magic)';
    if (n.startsWith('secret_')) return 'var(--warn)';
    if (n === 'shell' || n === 'write_file') return 'var(--warn)';
    if (n.startsWith('browser_') || n === 'http_request' || n === 'open_url') return 'var(--ok)';
    if (n === 'camera_capture' || n === 'read_file' || n === 'send_file') return 'var(--info)';
    if (n === 'tool_search' || n === 'spawn_task' || n === 'self_config') return 'var(--fg-3)';
    return 'var(--fg-3)';
  };
  const coreTools = realCore.length
    ? realCore.map(id => ({ id, desc: CORE_DESCRIPTIONS[id] || '', c: colorFor(id) }))
    : [];
  const renderToolRow = (t) =>
    '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)">' +
      '<span style="width:8px;height:8px;border-radius:50%;background:' + t.c + ';box-shadow:' + (t.on === false ? 'none' : '0 0 6px ' + t.c) + ';opacity:' + (t.on === false ? 0.35 : 1) + '"></span>' +
      '<div style="flex:1"><div class="mono" style="font-size:12px;color:var(--fg);font-weight:500;margin-bottom:2px">' + t.id + '</div>' +
      '<div style="font-size:11.5px;color:var(--fg-3)">' + esc(t.desc || '') + '</div></div>' +
      (t.core
        ? '<span class="tag">core</span>'
        : '<button class="toggle ' + (t.on ? 'on' : '') + '" data-toggle-skill="' + esc(t.id) + '"><span class="knob"></span></button>') +
    '</div>';
  // Easter-egg: tap the heart cluster 7 times → Spicy mode
  const hearts = Array.from({ length: 5 }, (_, i) =>
    '<button class="spicy-heart" data-spicy-click aria-label="heart" tabindex="-1">' + ico('heart', 13) + '</button>'
  ).join('');
  const spicyFoot =
    '<div class="spicy-footer">' +
      '<span class="spicy-hearts">' + hearts + '</span>' +
      (state.spicy
        ? '<span class="spicy-label active">spicy mode · ON</span>' +
          '<button class="chip" data-act="spicy-off">disable</button>'
        : '<span class="spicy-label">qwe-qwe</span>') +
    '</div>';

  return '<h2>Tools &amp; skills</h2><p class="intro">Capabilities the agent can invoke. Core tools are always active. Extended skills load on demand via <span class="mono">tool_search</span>.</p>' +
    settingsSection('Core tools',
      coreTools.map(t => renderToolRow(Object.assign({ core: true, on: true }, t))).join('')
    ) +
    settingsSection('Pluggable skills',
      skills.length === 0
        ? '<div style="padding:14px 0;color:var(--fg-4);font-size:12px">Loading…</div>'
        : skills.map(s => renderToolRow({
            id: s.name || s.id,
            desc: s.description || s.doc || '',
            c: 'var(--info)',
            on: !!(s.active || s.enabled),
          })).join('')
    ) +
    spicyFoot;
}

function renderTabMcp() {
  const servers = state.mcpServers || [];
  const running = servers.filter(s => s.connected).length;
  const tripped = servers.filter(s => (s.error_streak || 0) >= 3).length;
  const toolsTotal = servers.reduce((n, s) => n + (s.tools_count || 0), 0);

  const statsStrip = servers.length
    ? '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0">' +
        '<div class="mini-stat"><div class="lbl">RUNNING</div><div class="v">' + running + ' / ' + servers.length + '</div></div>' +
        '<div class="mini-stat"><div class="lbl">TOOLS</div><div class="v">' + toolsTotal + '</div></div>' +
        '<div class="mini-stat"><div class="lbl">TRIPPED</div><div class="v" style="color:' + (tripped ? 'var(--err)' : 'var(--fg)') + '">' + tripped + '</div></div>' +
      '</div>'
    : '';

  const renderServer = (s) => {
    const name = s.name || s.id;
    const conn = !!s.connected;
    const enabled = s.enabled !== false;
    const streak = s.error_streak || 0;
    const statusCls = conn ? 'ok' : (streak >= 3 ? 'err' : (enabled ? 'warn' : ''));
    const statusLabel = conn ? 'running' : (streak >= 3 ? 'broken' : (enabled ? 'stopped' : 'disabled'));
    const toolsList = (s.tools || []).slice(0, 8).map(t =>
      '<span class="tool-chip" title="' + esc(t.description || '') + '">' + esc(t.name) + '</span>'
    ).join('');
    const moreTools = (s.tools_count || 0) > 8 ? '<span class="tag">+' + ((s.tools_count || 0) - 8) + '</span>' : '';
    const envChips = (s.env_keys || []).map(k =>
      '<span class="tag" style="margin-right:4px">' + esc(k) + '</span>'
    ).join('');
    const errorBox = s.error
      ? '<div style="margin-top:8px;padding:8px 10px;border-radius:6px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);font-family:var(--font-mono);font-size:11px;color:var(--err);white-space:pre-wrap;word-break:break-word;max-height:180px;overflow:auto">' +
        esc(s.error) +
        (s.stderr_tail && s.stderr_tail.length
          ? '\n\n<stderr tail>\n' + esc(s.stderr_tail.slice(-5).join('\n'))
          : '') +
        '</div>'
      : '';
    return '<div class="job-card" style="padding:14px 16px">' +
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">' +
          '<div style="flex:1;min-width:0">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">' +
              '<span class="job-title">' + esc(name) + '</span>' +
              '<span class="status-badge ' + statusCls + '"><span class="sbdot"></span>' + statusLabel + '</span>' +
            '</div>' +
            '<div class="mono" style="font-size:11px;color:var(--fg-4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' +
              esc(s.transport || 'stdio') + ' · ' + esc(s.command || s.url || '—') +
              ((s.args || []).length ? ' ' + esc((s.args || []).join(' ')) : '') +
            '</div>' +
          '</div>' +
          '<div style="display:flex;gap:2px;flex-shrink:0">' +
            '<button class="icon-btn" data-mcp="' + esc(name) + '" data-mcp-act="restart" title="Restart">' + ico('refresh', 13) + '</button>' +
            '<button class="icon-btn" data-mcp="' + esc(name) + '" data-mcp-act="toggle" title="' + (enabled ? 'Disable' : 'Enable') + '">' + ico(enabled ? 'pause' : 'play', 13) + '</button>' +
            '<button class="icon-btn" data-mcp="' + esc(name) + '" data-mcp-act="delete" title="Remove">' + ico('trash', 13) + '</button>' +
          '</div>' +
        '</div>' +
        (envChips ? '<div style="margin-bottom:6px">' + envChips + '</div>' : '') +
        (toolsList
          ? '<div style="display:flex;flex-wrap:wrap;gap:4px;padding-top:8px;border-top:1px solid var(--line)">' + toolsList + moreTools + '</div>'
          : (conn ? '<div style="padding:8px 0;color:var(--fg-4);font-size:11px">No tools exposed by this server.</div>' : '')) +
        errorBox +

function renderAdvancedSub() {
  const t = state.advancedTab;
  if (t === 'settings') {
    const s = state.allSettings || {};
    const groups = [
      { label: 'Agent loop', keys: ['max_history_messages','max_tool_rounds','tool_retry_max','compaction_threshold','context_budget','presence_penalty','self_check_enabled','experience_learning','agent_loop_v2'] },
      { label: 'Memory & RAG', keys: ['max_memory_results','rag_chunk_size','rag_chunk_overlap','synthesis_enabled','synthesis_time','synthesis_max_per_run'] },
      { label: 'Inference', keys: ['ollama_num_ctx','fallback_provider','fallback_model'] },
      { label: 'Automation', keys: ['heartbeat_interval_min'] },
      { label: 'Vision', keys: ['camera_index'] },
      { label: 'STT', keys: ['stt_backend','stt_model','stt_language','stt_api_url','stt_api_model','stt_openai_key'] },
      { label: 'TTS', keys: ['tts_enabled','tts_api_url','tts_api_key','tts_api_model','tts_api_voice','tts_ref_audio','tts_ref_text'] },
    ];
    // /api/settings returns {key: {value, default, description, type, min, max}}
    const fieldFor = (k) => {
      const meta = s[k] || {};
      const v = meta.value;
      const stype = (meta.type || '').toLowerCase();   // 'int' | 'float' | 'str' | 'bool'
      const isBool = stype === 'bool' || (/(_enabled|_v2)$/.test(k) && (v === 0 || v === 1));
      const isSecret = /(_key|_token|api_key)$/.test(k);
      const isNumeric = stype === 'int' || stype === 'float';
      if (isBool) {
        return '<button class="toggle ' + (v ? 'on' : '') + '" data-setting-toggle="' + esc(k) + '"><span class="knob"></span></button>';
      }
      const inputType = isSecret ? 'password' : (isNumeric ? 'number' : 'text');
      const step = stype === 'float' ? '0.01' : (stype === 'int' ? '1' : null);
      const minAttr = (meta.min != null) ? ' min="' + meta.min + '"' : '';
      const maxAttr = (meta.max != null) ? ' max="' + meta.max + '"' : '';
      const stepAttr = step ? ' step="' + step + '"' : '';
      const valueStr = (v == null ? '' : String(v));
      return '<input type="' + inputType + '" class="setting-input mono"' +
        ' data-setting-key="' + esc(k) + '"' +
        ' data-setting-type="' + esc(stype) + '"' +
        minAttr + maxAttr + stepAttr +
        ' value="' + esc(valueStr) + '">';
    };
    if (!state.allSettings) {
      return '<div style="padding:24px 0;color:var(--fg-4);font-size:12px">Loading settings…</div>';
    }
    return '<p class="intro">Low-level tunables. Changes apply on next turn (no restart). Touch at your own risk.</p>' +
      groups.map(g => {
        const rows = g.keys.filter(k => k in s).map(k => {
          const desc = (s[k] && s[k].description) || '';
          return settingRow(k, desc, fieldFor(k));
        }).join('');
        return rows ? settingsSection(g.label, rows) : '';
      }).join('');
  }
  if (t === 'profile') {
    const p = state.userProfile || {};
    const entries = Object.entries(p);
    return settingsSection('User profile',
      entries.length
        ? entries.map(([k, v]) =>
          '<div class="entry-row">' +
            '<div style="flex:1;min-width:0"><div class="title mono">' + esc(k) + '</div>' +
            '<div class="sub" style="font-family:var(--font-ui);font-size:12px;color:var(--fg-2);white-space:normal">' + esc(v) + '</div></div>' +
            '<div class="actions"><button class="icon-btn" data-profile-del="' + esc(k) + '">' + ico('trash', 13) + '</button></div>' +
          '</div>').join('')
        : '<div style="padding:14px 0;color:var(--fg-4);font-size:12px">No profile entries yet. Add facts the agent should always remember about you.</div>'
    ) +
    '<div style="display:flex;gap:6px;margin-top:12px">' +
      '<input id="pf-key" class="setting-input mono" style="width:180px" placeholder="key (e.g. city)">' +
      '<input id="pf-val" class="setting-input" style="flex:1;width:auto" placeholder="value">' +
      '<button class="btn-secondary" data-act="profile-add">Add</button>' +
    '</div>';
  }
  if (t === 'stats') {
    const s = state.stats || {};
    const entries = Object.entries(s).filter(([k, v]) => typeof v !== 'object' || v === null);
    return '<div class="stats-row" style="grid-template-columns:repeat(auto-fill, minmax(150px, 1fr))">' +
      entries.slice(0, 8).map(([k, v]) =>
        '<div class="stat"><div class="lbl">' + esc(k.toUpperCase()) + '</div>' +
          '<div class="v" style="font-size:24px">' + esc(String(v == null ? '—' : v)) + '</div></div>'
      ).join('') +
    '</div>' +
    '<div style="margin-top:18px"><button class="btn-danger" data-act="stats-reset">Reset stats</button></div>';
  }
  if (t === 'config') {
    return settingRow('Export', 'Download all settings as JSON.',
        '<a class="btn-secondary" href="/api/config/export" download>download .json</a>') +
      settingRow('Import', 'Restore settings from a previously exported file.',
        '<button class="btn-secondary" data-act="config-import">pick file</button>');
  }
  if (t === 'updates') {
    const v = state.version || {};
    const current = v.current || '—';
    const latest = v.latest || '—';
    const outdated = !!v.outdated;
    return settingsSection('Version',
      settingRow('Current', '', '<input class="setting-input mono" value="' + esc(current) + '" readonly>') +
      settingRow('Latest', 'From GitHub releases.', '<input class="setting-input mono" value="' + esc(latest) + '" readonly>') +
      settingRow('Status', '', outdated
        ? '<span class="status-badge warn"><span class="sbdot"></span>update available</span>'
        : '<span class="status-badge ok"><span class="sbdot"></span>up to date</span>')
    ) +
    '<div style="display:flex;gap:8px;margin-top:14px">' +
      '<button class="btn-secondary" data-act="update-check">check</button>' +
      (outdated ? '<button class="btn-primary" data-act="update-run" style="box-shadow:none;padding:6px 12px">install update</button>' : '') +
      '<button class="btn-secondary" data-act="update-restart">restart server</button>' +
    '</div>';
  }
  if (t === 'secrets') {
    return '<p class="intro">Encrypted key-value vault the agent uses (API tokens, credentials). Keys here are referenced via <span class="mono">vault.get(name)</span> in tools.</p>' +
      '<div style="display:flex;align-items:center;gap:8px;margin:14px 0"><span class="mono" style="font-size:10px;color:var(--fg-4);letter-spacing:0.1em;text-transform:uppercase;flex:1">Stored keys</span>' +
        '<button class="btn-secondary" data-act="secret-add">' + ico('plusSmall', 12) + ' Add secret</button></div>' +
      (state.secrets.length
        ? state.secrets.map(k =>
            '<div class="entry-row"><div class="title mono" style="flex:1">' + esc(k) + '</div>' +
            '<span class="tag">encrypted</span>' +
            '<div class="actions"><button class="icon-btn" data-secret-del="' + esc(k) + '">' + ico('trash', 13) + '</button></div></div>'
          ).join('')
        : '<div style="padding:14px 0;color:var(--fg-4);font-size:12px">No secrets stored yet. Use the <span class="mono">secret_set</span> skill or add one here.</div>');
  }
  if (t === 'logs') {
    return '<p class="intro">Server logs (last 500 lines). Read-only.</p>' +
      '<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">' +
        '<button class="btn-secondary" data-act="logs-reload">' + ico('refresh', 12) + ' reload</button>' +
        '<button class="btn-secondary" data-act="logs-file" data-file="qwe-qwe.log">qwe-qwe.log</button>' +
        '<button class="btn-secondary" data-act="logs-file" data-file="errors.log">errors.log</button>' +
        '<div style="flex:1"></div>' +
        '<button class="btn-secondary" data-act="logs-copy">' + ico('download', 12) + ' copy</button>' +
      '</div>' +
      '<pre id="logs-pre" style="background:var(--bg-inspector);border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-family:var(--font-mono);font-size:11.5px;color:var(--fg-2);line-height:1.55;height:calc(100vh - 260px);min-height:360px;overflow:auto;white-space:pre-wrap;word-break:break-word">' +
      esc(state.logs || '(no logs)') + '</pre>';
  }
  return '';
}

// ───── Modal ─────
function openModal(opts) {
  state.modal = Object.assign({ actions: [], onClose: null, wide: false }, opts || {});
  render();
  setTimeout(() => {
    const first = document.querySelector('.modal-body input, .modal-body textarea, .modal-body select');
    if (first) first.focus();
  }, 20);
}
function closeModal() {
  const cb = state.modal && state.modal.onClose;
  state.modal = null;
  render();
  if (typeof cb === 'function') try { cb(); } catch {}
}
function renderModal() {
  const m = state.modal; if (!m) return '';
  const actionsHtml = (m.actions || []).map((a, i) =>
    '<button class="' + (a.primary ? 'btn-primary' : (a.danger ? 'btn-danger' : 'btn-secondary')) +
    '" data-modal-action="' + i + '"' + (a.disabled ? ' disabled' : '') + '>' + esc(a.label) + '</button>'
  ).join('');
  // Overlay deliberately has NO data-modal-close: clicking the dim backdrop
  // must NOT discard form state. Users fill in cron/MCP/trait modals for
  // 30+ seconds and an accidental outside-click wiping that out was the
  // top modal complaint. Close paths now: Cancel button, × button, ESC.
  return '<div class="modal-overlay">' +
    '<div class="modal-panel' + (m.wide ? ' wide' : '') + '" data-stop>' +
      '<div class="modal-head"><h2>' + esc(m.title || '') + '</h2>' +
        '<button class="icon-btn modal-close" data-modal-close>' + ico('close', 14) + '</button>' +
      '</div>' +
      '<div class="modal-body">' + (m.body || '') + '</div>' +
      (actionsHtml ? '<div class="modal-foot">' + actionsHtml + '</div>' : '') +
    '</div></div>';
}
function wireModal() {
  if (!state.modal) return;
  document.querySelectorAll('[data-modal-close]').forEach(b => {
    b.onclick = (e) => { if (e.target === b || e.currentTarget === b) closeModal(); };
  });
  document.querySelectorAll('[data-stop]').forEach(b => { b.onclick = (e) => e.stopPropagation(); });
  document.querySelectorAll('[data-modal-action]').forEach(b => {
    b.onclick = () => {
      // Re-entry guard: once a handler is in flight, block further clicks
      // on ANY modal action button until it resolves. Without this, a slow
      // onClick (e.g. scheduler dry-run that takes 30s) lets impatient users
      // click "Create" multiple times and create duplicate jobs.
      if (b.dataset.busy === '1') return;
      const i = parseInt(b.dataset.modalAction, 10);
      const a = (state.modal && state.modal.actions || [])[i];
      if (!a) return;
      // Disable every action button + show progress text on the clicked one.
      const allBtns = document.querySelectorAll('[data-modal-action]');
      const originalLabel = b.textContent;
      b.dataset.busy = '1';
      b.textContent = a.busyLabel || 'Working…';
      allBtns.forEach(x => x.setAttribute('disabled', 'disabled'));
      Promise.resolve()
        .then(() => a.onClick && a.onClick())
        .then(keep => {
          if (keep !== false) { closeModal(); return; }
          // Handler chose to keep modal open (usually validation error) —
          // re-enable the buttons so the user can fix inputs and retry.
          b.textContent = originalLabel;
          b.dataset.busy = '';
          allBtns.forEach(x => x.removeAttribute('disabled'));
        })
        .catch(err => {
          // onClick itself threw — surface it and let the user retry.
          console.error('modal action failed', err);
          toast('action failed', 'err');
          b.textContent = originalLabel;
          b.dataset.busy = '';
          allBtns.forEach(x => x.removeAttribute('disabled'));
        });
    };
  });
}

// Reusable helper: "section" heading inside settings body
function settingsSection(title, rowsHtml) {
  return '<div style="margin:28px 0 10px"><div class="mono" style="font-size:10px;color:var(--fg-4);letter-spacing:0.1em;text-transform:uppercase;font-weight:600">' + esc(title) + '</div></div>' + rowsHtml;
}

function scrollToBottom(onlyIfAtBottom) {
  // Wait for the browser to apply the layout from the latest render() before measuring.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const col = document.getElementById('chat-scroll');
      if (!col) return;
      if (onlyIfAtBottom) {
        const dist = col.scrollHeight - col.scrollTop - col.clientHeight;
        if (dist > 200) return;
      }
      col.scrollTop = col.scrollHeight;
    });
  });
}

function go(view) {
  if (state.view === view) return;
  state.view = view;
  render();
  if (view === 'memory') loadMemory();
  if (view === 'scheduler') loadCron();
  if (view === 'presets') loadPresets();
  if (view === 'settings') openSettingsTab(state.settingsTab);
}

  document.querySelectorAll('[data-act="new-thread"]').forEach(b => { b.onclick = newThread; });
  const search = document.querySelector('[data-search="thread"]');
  if (search) search.addEventListener('input', (e) => { state.threadSearch = e.target.value; render(); });

  const ta = document.getElementById('composer-ta');
  const sendBtn = document.getElementById('composer-send');
  const counter = document.getElementById('composer-count');
  const canSend = () => !!(ta && (ta.value.trim() || state.pendingAttachments.length || state.capturedFrame));
  const refreshSendBtn = () => { if (sendBtn) sendBtn.disabled = !canSend(); };
  if (ta) {

    // Paste files / images directly

  document.querySelectorAll('[data-act="routine-run-now"]').forEach(b => {

    };
  });

  document.querySelectorAll('[data-drop-att]').forEach(b => { b.onclick = () => dropAttachment(b.dataset.dropAtt); });

  // Camera PiP action buttons
  document.querySelectorAll('[data-act="pip-capture"]').forEach(b => { b.onclick = cameraCaptureToComposer; });
  document.querySelectorAll('[data-act="pip-close"]').forEach(b => { b.onclick = cameraStop; });
  // Re-attach stream to video (survives innerHTML re-render)
  if (state.cameraOn && state.cameraStream) {
    const v = document.getElementById('pip-video');
    if (v && v.srcObject !== state.cameraStream) {

      v.play().catch(() => {});

  document.querySelectorAll('[data-copy]').forEach(b => {
    b.onclick = () => {

  document.querySelectorAll('[data-act="copy-msg"]').forEach(b => {

  });
  document.querySelectorAll('[data-act="msg-good"]').forEach(b => { b.onclick = () => toast('thanks — feedback saved'); });
  document.querySelectorAll('[data-act="msg-bad"]').forEach(b => { b.onclick = () => toast('noted — we\'ll do better'); });
  document.querySelectorAll('[data-act="msg-regen"]').forEach(b => {
    b.onclick = async () => {
      // Clean regeneration: server deletes the last user→assistant turn so the
      // model has no idea this is a regeneration — it's just a fresh prompt.
      if (!state.activeThreadId) { toast('no active thread', 'err'); return; }
      if (state.busy) { toast('wait for current turn', 'err'); return; }
      toast('regenerating…');
      try {
        const r = await api('/api/threads/' + encodeURIComponent(state.activeThreadId) + '/regenerate', { method: 'POST' });
        const userText = (r && r.user_text) || '';
        if (!userText) { toast('no user message to regenerate', 'err'); return; }
        // Drop the deleted messages from the local view
        const idx = state.messages.findIndex(m => m.id === b.dataset.id);
        if (idx >= 0) {
          // Remove the stale assistant + preceding user message
          let userIdx = -1;
          for (let i = idx - 1; i >= 0; i--) {
            if (state.messages[i].role === 'user') { userIdx = i; break; }
          }
          state.messages.splice(userIdx >= 0 ? userIdx : idx, userIdx >= 0 ? (idx - userIdx + 1) : 1);
        }
        render();
        // Send via standard path — server appends fresh user+assistant rows
        sendMessage(userText);
      } catch (e) {
        toast('regenerate failed', 'err');
      }
    };
  });
  document.querySelectorAll('[data-act="msg-save"]').forEach(b => {
    b.onclick = async () => {
      const text = decodeURIComponent(b.dataset.text || '');
      if (!text.trim()) return;
      // Direct save — bypass the agent. Going through the LLM was slow
      // and the agent's own memory-discipline rule biased it AWAY from
      // saving on user request. POST /api/memory/save persists the
      // text in one round-trip, no LLM cost, no fake user message.
      try {
        const r = await api('/api/memory/save', { method: 'POST', body: {
          text, tag: 'user', thread_id: state.activeThreadId || undefined,
        }});
        if (r && r.ok) {
          toast('saved to memory');
          // Visual confirmation on the button — flash to filled state
          b.classList.add('saved');
          setTimeout(() => b.classList.remove('saved'), 1500);
        } else {

        }

  document.querySelectorAll('[data-act="toggle-inspector"]').forEach(b => { b.onclick = () => { state.inspectorOn = !state.inspectorOn; render(); }; });
  document.querySelectorAll('[data-act="toggle-anim"]').forEach(b => { b.onclick = () => { state.anim = !state.anim; render(); }; });
  document.querySelectorAll('[data-act="toggle-grain"]').forEach(b => { b.onclick = () => { state.grain = !state.grain; document.body.style.setProperty('--grain-op', state.grain ? '0.025' : '0'); render(); }; });
  document.querySelectorAll('[data-act="memory-refresh"]').forEach(b => { b.onclick = loadMemory; });
  // Per-entry delete on the Saved memories panel — direct DELETE
  // /api/memory/{id}, refresh the list. confirm() because dedup is on
  // and re-saving the same text would just hit the same id, but a
  // permanent removal of a stored fact is genuinely irreversible.
  document.querySelectorAll('[data-mem-del]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.memDel;
      if (!id) return;
      if (!confirm('Delete this memory?\nThis is permanent — both the markdown twin and the Qdrant vector are removed.')) return;
      try {
        const r = await api('/api/memory/' + encodeURIComponent(id), { method: 'DELETE' });
        if (r && r.ok) { toast('memory deleted'); loadMemory(); }
        else toast(r && r.error ? r.error : 'delete failed', 'err');
      } catch { toast('delete failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="graph-clear"]').forEach(b => {
    b.onclick = async () => {
      if (!confirm('Clear the knowledge graph? Entities + wiki pages will be removed.\nIndexed chunks are kept; only the synthesized graph layer is cleared.')) return;
      try { await api('/api/knowledge/graph/clear', { method: 'POST' }); toast('graph cleared'); loadMemory(); }
      catch { toast('clear failed', 'err'); }
    };
  });

  // ── Knowledge graph: toolbar + pan + zoom + node drag ─────────────────────
  const graphSvg = document.querySelector('svg[data-graph-svg]');
  const graphRoot = graphSvg && graphSvg.querySelector('#graph-root');
  if (graphSvg && graphRoot) {
    // Helpers
    const applyView = () => {
      const v = state.kbView;
      graphRoot.setAttribute('transform', 'translate(' + v.tx + ' ' + v.ty + ') scale(' + v.zoom + ')');
    };
    const clampZoom = z => Math.min(8, Math.max(0.25, z));
    // Convert screen px delta → SVG viewBox units (200×200 viewBox, scaled to
    // whatever size the container has)
    const screenToSvg = (dx, dy) => {
      const rect = graphSvg.getBoundingClientRect();
      const scale = 200 / Math.min(rect.width, rect.height);
      return { x: dx * scale, y: dy * scale };
    };

    // Zoom on wheel — anchor at cursor
    graphSvg.addEventListener('wheel', (ev) => {
      ev.preventDefault();
      const rect = graphSvg.getBoundingClientRect();
      const scaleFactor = 200 / Math.min(rect.width, rect.height);
      // Cursor position in viewBox coords (before zoom)
      const cx = (ev.clientX - rect.left) * scaleFactor;
      const cy = (ev.clientY - rect.top) * scaleFactor;
      const v = state.kbView;
      // Point in graph-root coords (before transform)
      const gx = (cx - v.tx) / v.zoom;
      const gy = (cy - v.ty) / v.zoom;
      const factor = ev.deltaY < 0 ? 1.15 : 1/1.15;
      const newZoom = clampZoom(v.zoom * factor);
      v.zoom = newZoom;
      // Keep cursor anchor stable: solve for tx, ty such that gx*zoom + tx = cx
      v.tx = cx - gx * newZoom;
      v.ty = cy - gy * newZoom;
      applyView();
    }, { passive: false });

    // Double-click empty space → reset view
    graphSvg.addEventListener('dblclick', (ev) => {
      if (ev.target.closest('[data-kb-node]')) return;
      state.kbView = { tx: 0, ty: 0, zoom: 1 };
      applyView();
    });

    // Pan with drag on empty canvas.
    // Document-level mousemove/mouseup/mouseleave handlers attach ONCE (globally)
    // and look up current pan state via state._graphPan, so re-rendering the
    // graph doesn't accumulate stale listeners with dead closures.
    graphSvg.addEventListener('mousedown', (ev) => {
      if (ev.target.closest('[data-kb-node]')) return;  // node drag takes over
      state._graphPan = {
        startX: ev.clientX, startY: ev.clientY,
        initTx: state.kbView.tx, initTy: state.kbView.ty,
        svg: graphSvg,
      };
      graphSvg.style.cursor = 'grabbing';
      ev.preventDefault();
    });
    if (!state._graphGlobalHandlersAttached) {
      state._graphGlobalHandlersAttached = true;
      document.addEventListener('mousemove', (ev) => {
        const p = state._graphPan;
        if (!p) return;
        const svg = p.svg;
        if (!svg || !svg.isConnected) { state._graphPan = null; return; }
        const rect = svg.getBoundingClientRect();
        const scale = 200 / Math.min(rect.width, rect.height);
        state.kbView.tx = p.initTx + (ev.clientX - p.startX) * scale;
        state.kbView.ty = p.initTy + (ev.clientY - p.startY) * scale;
        const root = svg.querySelector('#graph-root');
        if (root) root.setAttribute('transform', 'translate(' + state.kbView.tx + ' ' + state.kbView.ty + ') scale(' + state.kbView.zoom + ')');
      });
      const endPanGlobal = () => {
        const p = state._graphPan;
        if (p && p.svg) p.svg.style.cursor = '';
        state._graphPan = null;
      };
      document.addEventListener('mouseup', endPanGlobal);
      document.addEventListener('mouseleave', endPanGlobal);
    }

    // Node drag — mutates node.x/y and updates DOM in place (no full re-render
    // so drag stays smooth and the outer event handlers don't get detached)
    const updateNodeDom = (id, node) => {
      const group = graphSvg.querySelector('[data-kb-node="' + CSS.escape(id) + '"]');
      if (!group) return;
      const halo = group.querySelector('.halo'), core = group.querySelector('.core');
      const text = group.querySelector('text');
      if (halo) { halo.setAttribute('cx', node.x); halo.setAttribute('cy', node.y); }
      if (core) { core.setAttribute('cx', node.x); core.setAttribute('cy', node.y); }
      if (text) {
        const rBase = parseFloat(core ? core.getAttribute('r') : 3.2);
        text.setAttribute('x', node.x);
        text.setAttribute('y', node.y + rBase + 5.6);
      }
      // Update every line touching this node
      graphSvg.querySelectorAll('line[data-edge]').forEach(ln => {
        const [a, b] = (ln.getAttribute('data-edge') || '').split('|');
        if (a === id) { ln.setAttribute('x1', node.x); ln.setAttribute('y1', node.y); }
        if (b === id) { ln.setAttribute('x2', node.x); ln.setAttribute('y2', node.y); }
      });
    };

    document.querySelectorAll('[data-kb-node]').forEach(el => {
      el.addEventListener('mousedown', (ev) => {
        ev.stopPropagation();  // don't start a pan
        ev.preventDefault();
        const id = el.getAttribute('data-kb-node');
        const node = (state.kbGraph.nodes || []).find(n => String(n.id) === id);
        if (!node) return;
        const startX = ev.clientX, startY = ev.clientY;
        const initX = node.x, initY = node.y;
        let moved = false;
        el.style.cursor = 'grabbing';
        const onMove = (e) => {
          const d = screenToSvg(e.clientX - startX, e.clientY - startY);
          node.x = initX + d.x / state.kbView.zoom;
          node.y = initY + d.y / state.kbView.zoom;

        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          el.style.cursor = '';
          // Only pick-on-click if there was no meaningful drag

      // Compute bounding box of current node positions
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      nodes.forEach(n => {
        if (n.x < minX) minX = n.x;
        if (n.y < minY) minY = n.y;
        if (n.x > maxX) maxX = n.x;
        if (n.y > maxY) maxY = n.y;
      });
      const pad = 15;
      const w = (maxX - minX) + pad*2;
      const h = (maxY - minY) + pad*2;
      const zoom = Math.min(8, Math.max(0.25, 200 / Math.max(w, h)));
      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      state.kbView = {
        tx: 100 - cx * zoom,
        ty: 100 - cy * zoom,
        zoom,
      };
      const root = document.querySelector('#graph-root');

      const v = (document.getElementById('pf-val') || {}).value || '';
      if (!k.trim() || !v.trim()) { toast('key + value', 'err'); return; }
      try { await api('/api/user-profile', { method: 'POST', body: { key: k.trim(), value: v.trim() } }); toast('saved'); loadAdvanced(); }
      catch { toast('save failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-profile-del]').forEach(b => {
    b.onclick = async () => {
      const k = b.dataset.profileDel;
      try { await api('/api/user-profile', { method: 'POST', body: { delete: k } }); toast('removed'); loadAdvanced(); }
      catch { toast('delete failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="stats-reset"]').forEach(b => {
    b.onclick = async () => {
      if (!confirm('Reset all stats?')) return;
      try { await api('/api/stats/reset', { method: 'POST' }); toast('reset'); loadAdvanced(); }
      catch { toast('reset failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="config-import"]').forEach(b => {
    b.onclick = () => {
      const i = document.createElement('input'); i.type = 'file'; i.accept = '.json';
      i.onchange = async () => {
        if (!i.files[0]) return;
        const fd = new FormData(); fd.append('file', i.files[0]);
        try { await api('/api/config/import', { method: 'POST', body: fd }); toast('imported — reload'); setTimeout(() => location.reload(), 400); }
        catch { toast('import failed', 'err'); }
      };
      i.click();
    };
  });
  document.querySelectorAll('[data-act="update-check"]').forEach(b => {
    b.onclick = async () => {
      try { state.version = await api('/api/update/check'); toast(state.version.outdated ? 'update available' : 'up to date'); render(); }
      catch { toast('check failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="update-run"]').forEach(b => {
    b.onclick = async () => {
      if (!confirm('Install update? Server will restart.')) return;
      try {
        await api('/api/update', { method: 'POST' });
        toast('update started — polling status…');
        // Poll /api/update/status until done
        let stalled = 0;
        for (let i = 0; i < 120; i++) {
          await new Promise(r => setTimeout(r, 1500));
          try {
            const s = await api('/api/update/status');
            const phase = (s && s.phase) || 'running';
            const msg = (s && s.message) || '';
            if (phase === 'done' || phase === 'restarting') {
              toast('update complete — restarting');
              setTimeout(() => location.reload(), 3000);
              break;
            }
            if (phase === 'error') { toast('update failed: ' + msg, 'err'); break; }
            toast(phase + (msg ? ' · ' + msg.slice(0, 40) : ''));
          } catch { stalled++; if (stalled > 5) break; }
        }
      } catch { toast('update failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="update-restart"]').forEach(b => {
    b.onclick = async () => {
      if (!confirm('Restart server now?')) return;
      try { await api('/api/update/restart', { method: 'POST' }); toast('restarting'); }
      catch {}
    };
  });
  document.querySelectorAll('[data-act="secret-add"]').forEach(b => {
    b.onclick = () => {
      const body =
        '<div class="field"><div class="label">Key</div>' +
          '<input type="text" id="sec-key" class="mono" placeholder="github_token / openai_key / …" autofocus></div>' +
        '<div class="field"><div class="label">Value</div>' +
          '<input type="password" id="sec-val" placeholder="paste the secret"></div>' +
        '<div class="hint">Stored encrypted (Fernet, key derived from your install). Tools reference it by key via <span class="mono">vault.get(name)</span>.</div>';
      openModal({
        title: 'Add secret', body,
        actions: [
          { label: 'Cancel' },
          { label: 'Save', primary: true, onClick: async () => {
              const key = (document.getElementById('sec-key').value || '').trim();
              const value = (document.getElementById('sec-val').value || '');
              if (!key || !value) { toast('key + value required', 'err'); return false; }
              try { await api('/api/secrets', { method: 'POST', body: { key, value } }); toast('saved'); loadAdvanced(); }
              catch { toast('save failed', 'err'); return false; }
          }},
        ],
      });
    };
  });
  document.querySelectorAll('[data-secret-del]').forEach(b => {
    b.onclick = async () => {
      const k = b.dataset.secretDel;
      if (!confirm('Delete secret "' + k + '"?')) return;
      try { await api('/api/secrets/' + encodeURIComponent(k), { method: 'DELETE' }); toast('deleted'); loadAdvanced(); }
      catch { toast('delete failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="logs-reload"]').forEach(b => { b.onclick = () => { state._logsFile = state._logsFile || 'qwe-qwe.log'; loadAdvancedLogs(); }; });
  document.querySelectorAll('[data-act="logs-file"]').forEach(b => {
    b.onclick = async () => {
      state._logsFile = b.dataset.file;
      await loadAdvancedLogs();
    };
  });
  document.querySelectorAll('[data-act="logs-copy"]').forEach(b => {
    b.onclick = () => { navigator.clipboard.writeText(state.logs || ''); toast('logs copied'); };
  });

  // Full settings editor — values live at state.allSettings[key].value
  document.querySelectorAll('[data-setting-key]').forEach(inp => {
    inp.addEventListener('change', async () => {
      const key = inp.dataset.settingKey;
      const stype = inp.dataset.settingType || 'str';
      let value = inp.value;
      if (stype === 'int') value = parseInt(value, 10);
      else if (stype === 'float') value = parseFloat(value);
      if ((stype === 'int' || stype === 'float') && Number.isNaN(value)) {
        toast('invalid number', 'err'); return;
      }
      try {
        await api('/api/settings', { method: 'POST', body: { [key]: value } });
        toast(key + ' saved');
        if (state.allSettings && state.allSettings[key]) state.allSettings[key].value = value;
      } catch { toast('save failed', 'err'); }
    });
  });
  document.querySelectorAll('[data-setting-toggle]').forEach(b => {
    b.onclick = async () => {
      const key = b.dataset.settingToggle;
      const meta = (state.allSettings || {})[key] || {};
      const current = meta.value;
      const isBool = meta.type === 'bool';
      const want = isBool ? !current : (current ? 0 : 1);
      try {
        await api('/api/settings', { method: 'POST', body: { [key]: want } });
        toast(key + ': ' + (want ? 'on' : 'off'));
        if (state.allSettings && state.allSettings[key]) state.allSettings[key].value = want;
        render();
      } catch { toast('save failed', 'err'); }
    };
  });

  document.querySelectorAll('[data-act="palette-close"]').forEach(b => { b.onclick = (e) => { if (e.target === b) closePalette(); }; });
  document.querySelectorAll('[data-stop]').forEach(b => { b.onclick = (e) => e.stopPropagation(); });
  document.querySelectorAll('[data-palette-i]').forEach(b => {
    b.onclick = () => {
      const it = (window.__paletteItems || [])[parseInt(b.dataset.paletteI, 10)];
      if (it) { closePalette(); it.act(); }
    };
  });
  const pinp = document.getElementById('palette-input');
  if (pinp) {
    pinp.focus(); pinp.select();
    pinp.addEventListener('input', (e) => { state.paletteQ = e.target.value; render(); });
  }

  document.querySelectorAll('[data-cron]').forEach(b => {
    b.onclick = async (e) => {
      // Click-to-open-thread lives on the card body; button clicks must
      // not bubble up and navigate after confirming the action.
      e.stopPropagation();
      const id = b.dataset.cron, act = b.dataset.cronAct;
      if (act === 'delete') {
        if (!confirm('Delete this routine?\n\nThe routine and its chat thread (including all run history) will be permanently removed.')) return;
        try { await api('/api/cron/' + id, { method: 'DELETE' }); toast('deleted'); loadCron(); loadThreads({ silent: true }); }
        catch { toast('delete failed', 'err'); }
      } else if (act === 'toggle') {
        // Pause / resume — scheduler loop skips disabled rows.
        try {
          const r = await api('/api/cron/' + id + '/toggle', { method: 'POST' });
          toast(r && r.enabled ? 'resumed' : 'paused');
          loadCron();
        } catch { toast('toggle failed', 'err'); }
      } else if (act === 'run-now') {
        // Fire the routine immediately — agent runs in its thread and
        // the reply streams into the same conversation. After triggering,
        // auto-navigate so the user watches progress live.
        try {
          const r = await api('/api/cron/' + id + '/run', { method: 'POST' });
          if (r && r.already_running) {
            toast(r.hint || 'already running — wait', 'warn');
          } else {
            toast('running…');
          }
          if (r && r.thread_id) { await switchThread(r.thread_id); go('chat'); }
        } catch { toast('run failed', 'err'); }
      }
    };
  });
  // Click on a routine card → switch to that routine's thread, go to chat.
  document.querySelectorAll('[data-open-thread]').forEach(card => {
    card.onclick = async () => {
      const tid = card.dataset.openThread;
      if (!tid) return;
      try { await switchThread(tid); go('chat'); }
      catch { toast('could not open thread', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="new-cron"]').forEach(b => { b.onclick = openNewCronModal; });

  document.querySelectorAll('[data-act="preset-activate"]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.id;
      const p = state.presetList.find(pp => (pp.id || pp.name) == id);
      try {
        if (p && p.active) {
          b.disabled = true;
          b.innerHTML = ico('refresh', 9) + ' deactivating…';
          await api('/api/presets/deactivate', { method: 'POST' });
          toast('deactivated');
          setTimeout(() => location.reload(), 400);
        } else {
          // Show progress: "activating (indexing knowledge...)"
          b.disabled = true;
          b.innerHTML = ico('refresh', 9) + ' activating…';
          // Count knowledge entries from manifest for feedback
          const kCount = (p && p.manifest && (p.manifest.knowledge || []).length) || 0;
          if (kCount) toast('indexing ' + kCount + ' knowledge file' + (kCount === 1 ? '' : 's') + '…');
          const r = await api('/api/presets/' + encodeURIComponent(id) + '/activate', { method: 'POST' });
          // Fetch actual indexed file count to confirm
          let indexed = 0;
          try {
            const k = await api('/api/knowledge/list');
            indexed = ((k && k.files) || []).length;
          } catch {}
          toast('activated' + (indexed ? ' · ' + indexed + ' source' + (indexed === 1 ? '' : 's') + ' indexed' : ''));
          await loadPresets();
          // Show onboarding if preset has one
          const ob = await checkOnboarding();
          if (!ob) {
            // No onboarding → jump to Memory so user sees what loaded
            if (kCount > 0) {
              setTimeout(() => { go('memory'); }, 300);
            } else {
              setTimeout(() => location.reload(), 400);
            }
          }
        }
      } catch (e) {
        toast('failed', 'err');
        b.disabled = false;
        loadPresets();
      }
    };
  });
  document.querySelectorAll('[data-act="preset-delete"]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.id;
      const p = state.presetList.find(p => (p.id || p.name) == id);
      const name = (p && (p.name || p.id)) || id;
      if (!confirm('Uninstall preset "' + name + '"?\nThis removes its workspace, indexed knowledge, and chats.')) return;
      try {
        if (p && p.active) { try { await api('/api/presets/deactivate', { method: 'POST' }); } catch {} }
        await api('/api/presets/' + encodeURIComponent(id), { method: 'DELETE' });
        toast('uninstalled');
        loadPresets();
        setTimeout(() => location.reload(), 400);
      } catch { toast('uninstall failed', 'err'); }
    };
  });
  document.querySelectorAll('[data-act="preset-install"]').forEach(b => {
    b.onclick = () => {
      const i = document.createElement('input'); i.type = 'file'; i.accept = '.qwp,.zip';
      i.onchange = async () => {
        if (!i.files[0]) return;
        const fd = new FormData(); fd.append('file', i.files[0]);
        try { await api('/api/presets/install', { method: 'POST', body: fd }); toast('installed'); loadPresets(); }
        catch { toast('install failed', 'err'); }
      };
      i.click();
    };
  });

}

function openPalette() { state.paletteOpen = true; state.paletteQ = ''; render(); }
function closePalette() { state.paletteOpen = false; render(); }

// Central keyboard handler — shortcuts work regardless of focus (Alt+letter is rare),
// except for the few that need to distinguish from typing (Escape, Enter).
document.addEventListener('keydown', (e) => {
  // Palette: Ctrl/⌘+K
  if ((e.metaKey || e.ctrlKey) && !e.altKey && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    state.paletteOpen ? closePalette() : openPalette();
    return;
  }
  // Close palette / modal
  if (e.key === 'Escape') {
    if (state.paletteOpen) { closePalette(); return; }
    if (state.modal) { closeModal(); return; }
  }
  // Navigation: Alt+letter (safe on Mac + Windows, unused by browser)
  if (e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
    const map = { t: 'chat', m: 'memory', s: 'scheduler', p: 'presets', ',': 'settings' };
    const k = e.key.toLowerCase();
    if (map[k]) { e.preventDefault(); go(map[k]); return; }
    if (k === 'n') { e.preventDefault(); newThread(); return; }
    if (k === '?') { e.preventDefault(); openShortcutsModal(); return; }
  }
  // Show cheatsheet: Shift+? (most keyboards)
  if (e.shiftKey && e.key === '?' && !/^(INPUT|TEXTAREA|SELECT)$/.test((e.target && e.target.tagName) || '')) {
    e.preventDefault(); openShortcutsModal();
  }
});

function openShortcutsModal() {
  const rows = [
    ['Navigate', [
      [MOD + ' K', 'Open command palette'],
      [ALT_MOD + ' T', 'Go to Threads (chat)'],
      [ALT_MOD + ' M', 'Go to Memory'],
      [ALT_MOD + ' S', 'Go to Scheduler'],
      [ALT_MOD + ' P', 'Go to Presets'],
      [ALT_MOD + ' ,', 'Go to Settings'],
    ]],
    ['Composer', [
      [ALT_MOD + ' N', 'New thread'],
      ['Enter', 'Send message'],
      [SHIFT_MOD + ' Enter', 'Newline (in composer)'],
    ]],
    ['General', [
      ['Esc', 'Close modal / palette'],
      [SHIFT_MOD + ' ?', 'Show this cheatsheet'],
    ]],
  ];
  const body = rows.map(([group, items]) =>
    '<div style="margin-bottom:16px">' +
      '<div class="mono" style="font-size:10px;color:var(--fg-4);letter-spacing:0.1em;text-transform:uppercase;font-weight:600;margin-bottom:8px">' + esc(group) + '</div>' +
      items.map(([k, desc]) =>
        '<div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--line)">' +
          '<span style="flex:1;font-size:12.5px;color:var(--fg-2)">' + esc(desc) + '</span>' +
          '<span class="kbd">' + esc(k) + '</span>' +
        '</div>').join('') +
    '</div>'
  ).join('');
  openModal({
    title: 'Keyboard shortcuts',
    body: '<div style="font-size:11px;color:var(--fg-4);margin-bottom:14px;line-height:1.55">Detected platform: <span class="mono">' + (IS_MAC ? 'macOS' : 'Windows / Linux') + '</span> — shortcuts below use the appropriate modifiers.</div>' + body,
    actions: [{ label: 'Got it', primary: true }],
  });
}

(async function boot() {
  render();
  wsConnect();
  await loadStatus();
  await loadThreads();
  await loadActiveMessages();
  loadSpicy();  // swap logo if spicy was active last session
  checkFirstRunSetup();
  checkOnboarding();
})();
</script>
</body>
</html>
