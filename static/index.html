function renderThreadList() {
  const q = state.threadSearch.toLowerCase();
  const filtered = q ? state.threads.filter(t => (t.name || '').toLowerCase().includes(q)) : state.threads;
  const pinned = filtered.filter(t => t.pinned);
  const rest = filtered.filter(t => !t.pinned);
  const row = (t) =>
    '<div class="tl-row '+(t.id === state.activeThreadId ? 'active' : '')+'" data-thread="'+t.id+'" role="button" tabindex="0">' +
      '<div class="tl-title-row">' +
        (t.pinned ? ico('star', 9, 'style="color:var(--accent)"') : '') +
        '<span class="tl-title">' + esc(t.name || '(untitled)') + '</span>' +
        '<span class="tl-time">' + esc(fmtTime(t.updated_at || t.created_at)) + '</span>' +
      '</div>' +
      '<div class="tl-preview">' + esc(t.preview || t.last_message || '') + '</div>' +
      '<div class="tl-actions">' +
        '<button class="icon-btn" data-thread-act="folder" data-id="' + esc(t.id) + '" title="Move to folder">' + ico('package', 12) + '</button>' +
        '<button class="icon-btn" data-thread-act="rename" data-id="' + esc(t.id) + '" title="Rename">' + ico('edit', 12) + '</button>' +
        '<button class="icon-btn" data-thread-act="delete" data-id="' + esc(t.id) + '" title="Delete">' + ico('trash', 12) + '</button>' +
      '</div>' +
    '</div>';

  // Bucket non-pinned threads by meta.folder. Each folder is a
  // collapsible group; threads without a folder fall under "RECENT".
  // Collapse state persists in localStorage per folder name.
  const collapsed = (() => {
    try { return new Set(JSON.parse(localStorage.getItem('tl-collapsed') || '[]')); }
    catch { return new Set(); }
  })();
  const groups = {};
  for (const t of rest) {
    const f = (t.meta && t.meta.folder) || '';
    (groups[f] = groups[f] || []).push(t);
  }
  const folderNames = Object.keys(groups).filter(f => f).sort((a, b) => a.localeCompare(b));
  const ungrouped = groups[''] || [];

  const folderSection = (name, items) => {
    const isCollapsed = collapsed.has(name);
    return '<div class="tl-folder-head" data-folder-collapse="' + esc(name) + '">' +
        '<span class="tl-chev" style="' + (isCollapsed ? 'transform:rotate(-90deg)' : '') + '">' + ico('arrow', 8) + '</span>' +
        '<span class="tl-folder-name">' + esc(name) + '</span>' +
        '<span class="tl-folder-count">' + items.length + '</span>' +
      '</div>' +
      (isCollapsed ? '' : items.map(row).join(''));
  };

  return '<aside class="threadlist ' + (state.threadlistOpen ? 'open' : '') + '">' +
    '<div class="tl-head">' +
      '<div class="tl-head-row"><h2>Threads</h2><span class="tl-count">'+state.threads.length+'</span>' +
        '<button class="icon-btn" data-act="new-thread" aria-label="New thread">'+ico('plusSmall',13)+'</button></div>' +
      '<div class="tl-search">' + ico('search', 11, 'style="color:var(--fg-4)"') +
        '<input data-search="thread" placeholder="Search threads…" value="' + esc(state.threadSearch) + '"></div>' +
    '</div>' +
    '<div class="tl-list">' +
      (pinned.length ? '<div class="tl-group-label">PINNED · '+pinned.length+'</div>' + pinned.map(row).join('') : '') +
      folderNames.map(n => folderSection(n, groups[n])).join('') +
      (ungrouped.length
        ? '<div class="tl-group-label">RECENT</div>' + ungrouped.map(row).join('')
        : '') +
      (!state.threads.length ? '<div style="padding:20px 14px;font-size:11.5px;color:var(--fg-4)">No threads yet.</div>' : '') +
    '</div>' +
    '<div class="tl-foot">' + ico('package',11,'style="color:var(--fg-4)"') + '<span>'+state.threads.length+' threads</span></div>' +
  '</aside>';
}

function renderMessageBody(msg) {
  // User messages: preserve newlines but keep markdown minimal (links, inline code, bold)
  if (msg.role === 'user') {
    return '<div>' + renderMarkdownText(msg.content || '') + '</div>';
  }
  const blocks = parseMarkdownLite(msg.content || '');
  return blocks.map(b => {
    if (b.type === 'text') {
      const rendered = renderMarkdownText(b.value);
      return rendered ? '<div class="md">' + rendered + '</div>' : '';
    }
    const lineCount = (b.code.match(/\n/g) || []).length + 1;
    const nums = Array.from({ length: lineCount }, (_, i) => i + 1).join('\n');
    return '<div class="codeblock">' +
      '<div class="cb-head">' + ico('terminal', 12, 'style="color:var(--fg-4)"') +
        '<span class="cb-file">' + esc(b.file || 'snippet') + '</span>' +
        '<span class="cb-lang">' + esc(b.lang || 'text') + '</span>' +
        '<button class="cb-copy" data-copy="' + encodeURIComponent(b.code) + '">' + ico('copy', 10) + '<span>copy</span></button>' +
      '</div>' +
      '<div class="cb-body">' +
        '<pre class="cb-nums">' + nums + '</pre>' +
        '<pre><code>' + paintCode(b.code, b.lang) + '</code></pre>' +
      '</div>' +
    '</div>';
  }).join('');
}

// Tool categorization — groups related tool calls in the chat transcript
const TOOL_CATEGORIES = [
  { id: 'memory',  label: 'Memory',        icon: 'brain',    color: 'var(--magic)', match: (n) => /^memory_/.test(n) },
  { id: 'knowledge', label: 'Knowledge',   icon: 'book',     color: 'var(--magic)', match: (n) => /^(rag_|kb_|knowledge_)/.test(n) },
  { id: 'files',   label: 'Files',         icon: 'terminal', color: 'var(--info)',  match: (n) => /^(read|write|send|edit|delete|list)_file$|^(ls|cat|mkdir|rm|mv|cp)$/.test(n) },
  { id: 'shell',   label: 'Shell',         icon: 'terminal', color: 'var(--warn)',  match: (n) => /^(shell|bash|exec|run_command)$/.test(n) },
  { id: 'browser', label: 'Browser',       icon: 'globe',    color: 'var(--ok)',    match: (n) => /^browser_/.test(n) },
  { id: 'web',     label: 'Web',           icon: 'globe',    color: 'var(--ok)',    match: (n) => /^(http_request|open_url|fetch_url|web_search)$/.test(n) },
  { id: 'vision',  label: 'Vision',        icon: 'eye',      color: 'var(--info)',  match: (n) => /^(camera_|vision_|image_)/.test(n) },
  { id: 'voice',   label: 'Voice',         icon: 'mic',      color: 'var(--info)',  match: (n) => /^(tts|stt|voice_|audio_)/.test(n) },
  { id: 'schedule', label: 'Automation',   icon: 'clock',    color: 'var(--info)',  match: (n) => /^(cron_|schedule_|heartbeat_|timer_)/.test(n) },
  { id: 'skill',   label: 'Skills',        icon: 'wrench',   color: 'var(--fg-3)',  match: (n) => /^(skill_|soul_|profile_)/.test(n) },
  { id: 'orchestration', label: 'Orchestration', icon: 'sparkle', color: 'var(--fg-3)', match: (n) => /^(tool_search|spawn_task|abort|mcp_)/.test(n) },
];
const categorize = (name) => {
  for (const c of TOOL_CATEGORIES) if (c.match(name || '')) return c;
  return { id: 'other', label: 'Other', icon: 'wrench', color: 'var(--fg-4)' };
};

function renderToolRow(t, idx) {
  const statusClass = t.status === 'running' ? 'running' : (t.status === 'err' ? 'err' : 'ok');
  const statusIcon = t.status === 'running'
    ? '<span style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:statusPulse 1.2s infinite"></span>'
    : (t.status === 'err' ? ico('close', 11) : ico('check', 11));
  // Inline args — compact preview
  const argsInline = (t.args && typeof t.args === 'object' && Object.keys(t.args).length)
    ? Object.entries(t.args).map(([k, v]) => {
        const s = typeof v === 'string' ? '"' + v.slice(0, 40) + (v.length > 40 ? '…' : '') + '"' : JSON.stringify(v).slice(0, 40);
        return k + '=' + s;
      }).join(', ')
    : '';
  // Pretty input/output for the expanded body
  const argsPretty = (t.args && typeof t.args === 'object' && Object.keys(t.args).length)
    ? JSON.stringify(t.args, null, 2) : '';
  const resultFull = t.result != null ? String(t.result) : '';
  const resultPreview = resultFull ? resultFull.replace(/\s+/g, ' ').slice(0, 80) : '';
  const hasDetails = !!(argsPretty || (resultFull && resultFull.length > 80));
  return '<details class="tool ' + statusClass + '">' +
    '<summary class="tool-head">' +
      '<span class="ico">' + statusIcon + '</span>' +
      '<span class="tool-name">' + esc(t.name || 'tool') + '</span>' +
      (argsInline ? '<span class="tool-args">(' + esc(argsInline) + ')</span>' : '') +
      (resultPreview ? '<span class="tool-result">→ ' + esc(resultPreview) + '</span>' : '') +
      (hasDetails ? '<span class="tool-chev">' + ico('arrow', 9, 'style="transform:rotate(-90deg)"') + '</span>' : '') +
    '</summary>' +
    (hasDetails ? '<div class="tool-body">' +
      (argsPretty ? '<div class="tool-body-label">Input</div><pre>' + esc(argsPretty) + '</pre>' : '') +
      (resultFull ? '<div class="tool-body-label">Output' + (resultFull.length > 4000 ? ' · truncated' : '') + '</div><pre>' + esc(resultFull.slice(0, 4000)) + '</pre>' : '') +
    '</div>' : '') +
  '</details>';
}

function renderTools(tools) {
  if (!tools || !tools.length) return '';
  const groups = new Map();
  for (const t of tools) {
    const c = categorize(t.name || '');
    if (!groups.has(c.id)) groups.set(c.id, { cat: c, items: [] });
    groups.get(c.id).items.push(t);
  }
  const okCount = tools.filter(x => x.status === 'ok').length;
  const runningCount = tools.filter(x => x.status === 'running').length;
  const errCount = tools.filter(x => x.status === 'err').length;
  const catCount = groups.size;
  const headBits = [
    okCount + '/' + tools.length + ' tool call' + (tools.length === 1 ? '' : 's'),
    catCount > 1 ? catCount + ' categor' + (catCount === 1 ? 'y' : 'ies') : '',
    errCount ? errCount + ' error' + (errCount === 1 ? '' : 's') : '',
    runningCount ? runningCount + ' running' : '',
  ].filter(Boolean);
  let html = '<div class="tools-hdr">' + headBits.join(' · ') + '</div>';
  for (const { cat, items } of groups.values()) {
    // If only one category OR just one call — skip group wrapper for cleaner visual
    if (catCount === 1 && items.length <= 2) {
      html += items.map((t, i) => renderToolRow(t, i)).join('');
      continue;
    }
    html += '<div class="tool-group">' +
      '<div class="tool-group-head">' +
        '<span class="tool-group-ico" style="color:' + cat.color + '">' + ico(cat.icon, 11) + '</span>' +
        '<span class="tool-group-label">' + cat.label + '</span>' +
        '<span class="tool-group-count">' + items.length + '</span>' +
      '</div>' +
      items.map((t, i) => renderToolRow(t, i)).join('') +
    '</div>';
  }
  return html;
}

function renderMessage(m) {
  // Routine auto-fire user messages render as a centered timestamp
  // divider instead of a full user bubble — see .routine-autofire CSS
  // and the flagging logic in renderChatView.
  if (m._autoFire) {
    return '<div class="routine-autofire" data-msg-id="' + esc(m.id) + '">' +
      '<span class="rf-label">fired · ' + esc(fmtTime(m.time)) + '</span>' +
    '</div>';
  }
  const isUser = m.role === 'user';
  const head = isUser
    ? '<div class="head"><span class="avatar">' + esc(((state.status && state.status.user && state.status.user.name) || 'Y')[0].toUpperCase()) + '</span>' +
      '<span class="who user">you</span><span class="time">·</span><span class="time">' + esc(fmtTime(m.time)) + '</span></div>'
    : '<div class="head"><span class="avatar duck"><img src="/static/logo.png" class="duck-micro" alt=""></span>' +
      '<span class="who">' + esc(state.soul.agent_name || 'qwe-qwe') + '</span>' +
      '<span class="time">·</span><span class="time">' + esc(fmtTime(m.time)) + '</span>' +
      (m.streaming ? '<span class="gen-tag"><span class="dot"></span>generating</span>' : '') + '</div>';
  // Thinking: expanded during active streaming (so user sees progress),
  // collapsed after the turn ends — avoids a giant essay eating the canvas
  // when the model dumps its draft inside <think>.
  const thinkingOpen = !!m.streaming;
  const thinkingLines = (m.thinking || '').split('\n').filter(Boolean).length;
  const thinking = m.thinking
    ? '<details class="thinking" data-stream-think="' + esc(m.id) + '"' + (thinkingOpen ? ' open' : '') + '>' +
        '<summary class="th-label">' + ico('sparkle', 10) + ' thinking' +
          (!thinkingOpen && thinkingLines > 1 ? ' · ' + thinkingLines + ' line' + (thinkingLines === 1 ? '' : 's') : '') +
          '<span class="th-chev">' + ico('arrow', 9, 'style="transform:rotate(-90deg)"') + '</span>' +
        '</summary>' +
        '<div class="th-text">' + esc(m.thinking) + '</div>' +
      '</details>'
    : '';
  const tools = renderTools(m.tools);
  const body = '<div class="body" data-stream-body="' + esc(m.id) + '">' + renderMessageBody(m) + (m.streaming ? '<span class="cursor"></span>' : '') + '</div>';
  const images = (m._images && m._images.length)
    ? '<div class="msg-images">' + m._images.map(src =>
        '<img src="' + esc(src) + '" loading="lazy" onclick="window.open(this.src,\'_blank\')">'
      ).join('') + '</div>'
    : '';
  const files = (m._files && m._files.length)
    ? '<div class="msg-files">' + m._files.map(f => {
        const url = f.url || ('/uploads/' + ((f.path || f.name || '').split(/[\\/]/).pop()));
        return '<a class="msg-file" href="' + esc(url) + '" target="_blank" rel="noopener">' +
          ico('download', 13) + '<span>' + esc(f.name || url) + '</span>' +
          (f.size ? '<span class="sz">' + humanSize(f.size) + '</span>' : '') + '</a>';
      }).join('') + '</div>'
    : '';
  const actions = !isUser && !m.streaming
    ? '<div class="action-bar">' +
        '<button class="icon-btn" data-act="msg-good" data-id="' + esc(m.id) + '" title="Good response">' + ico('check', 13) + '</button>' +
        '<button class="icon-btn" data-act="msg-bad" data-id="' + esc(m.id) + '" title="Bad response">' + ico('close', 13) + '</button>' +
        '<button class="icon-btn" data-act="copy-msg" data-text="' + encodeURIComponent(m.content || '') + '" title="Copy">' + ico('copy', 13) + '</button>' +
        '<button class="icon-btn" data-act="msg-regen" data-id="' + esc(m.id) + '" title="Regenerate">' + ico('refresh', 13) + '</button>' +
        '<button class="icon-btn" data-act="msg-save" data-text="' + encodeURIComponent(m.content || '') + '" title="Save to memory">' + ico('book', 13) + '</button>' +
      '</div>'
    : '';
  // Section order inside a message (top → bottom):
  //   1. head (avatar + timestamp + generating-tag)
  //   2. tools — what the agent DID (shell/read_file/http_request calls)
  //   3. thinking — internal reasoning, collapsed by default after turn ends
  //   4. body — the final reply text (what the user actually "reads")
  //   5. images / files — attachments returned by send_file etc
  //   6. actions — copy / regenerate / save-to-memory on hover
  // Rationale: users asked for tool-calls FIRST so the "what happened"
  // summary is the first thing visible, then reasoning, then the prose
  // reply. Previous order (thinking → body → tools) buried the concrete
  // actions under a wall of reasoning text.
  return '<section class="msg' + (isUser ? ' user' : '') + '" data-msg-id="' + esc(m.id) + '">' + head + tools + thinking + body + images + files + actions + '</section>';
}

function renderChatView() {
  const t = activeThread();
  const charCount = state.messages.reduce((n, m) => n + (m.content || '').length, 0);
  // Routine threads — the name starts with "Routine · <name>" — grow an
  // inline Run button in the header so the user can fire the routine
  // without going back to the Routines tab first. The corresponding
  // cron row is found via the cached state.cronJobs list loaded for the
  // Routines view.
  const isRoutine = t && t.name && t.name.startsWith('Routine · ');
  const routineJob = isRoutine
    ? (state.cronJobs || []).find(j => j.threadId === t.id)
    : null;

  // Mark auto-fire user messages. Each time a routine fires, agent.run
  // saves the task_desc as a user message — correct for LLM alternation
  // but redundant for the reader. Flag every occurrence AFTER the first
  // whose content matches the routine's task; renderMessage collapses
  // them into a compact horizontal rule.
  if (isRoutine && routineJob && routineJob.task) {
    const task = routineJob.task.trim();
    let firstSeen = false;
    for (const m of state.messages) {
      if (m.role === 'user' && m.content && m.content.trim() === task) {
        if (firstSeen) m._autoFire = true;
        else { firstSeen = true; delete m._autoFire; }
      } else {
        delete m._autoFire;
      }
    }
  }
  const paused = routineJob && (routineJob.status === 'paused' || routineJob.enabled === false);
  const pauseBtn = routineJob
    ? '<button class="btn-secondary" data-act="routine-toggle" data-routine-id="' + esc(routineJob.id) + '" title="' + (paused ? 'Resume this routine' : 'Pause — scheduler will skip firings') + '" style="display:inline-flex;align-items:center;gap:6px">' +
        ico(paused ? 'play' : 'pause', 11) + (paused ? 'Resume' : 'Pause') + '</button>'
    : '';
  const runBtn = routineJob
    ? (routineJob.firing
        ? '<button class="btn-secondary" disabled style="display:inline-flex;align-items:center;gap:6px;opacity:0.6">' +
            '<span class="spinner" style="width:10px;height:10px;border:2px solid var(--line-2);border-top-color:var(--accent);border-radius:50%;animation:kb-spin 0.8s linear infinite;display:inline-block"></span>' +
            'Running…</button>'
        : (paused
            ? ''  // while paused, hide Run-now so the only way to fire is to resume first
            : '<button class="btn-secondary" data-act="routine-run-now" data-routine-id="' + esc(routineJob.id) + '" style="display:inline-flex;align-items:center;gap:6px">' +
                ico('play', 11) + 'Run now</button>'))
    : '';
  // Combined control strip — pause + run sit together at the end.
  const routineCtrls = routineJob
    ? '<span style="margin-left:auto;display:flex;gap:6px">' + pauseBtn + runBtn + '</span>'
    : '';
  // Always-on status badge for routine threads. Three states so the
  // user can tell at a glance: actively firing now, scheduled & healthy,
  // or paused/disabled.
  const routineBadge = routineJob
    ? (routineJob.firing
        ? '<span class="status-badge warn" style="margin-left:8px"><span class="sbdot"></span>running</span>'
        : (routineJob.status === 'paused' || routineJob.enabled === false
            ? '<span class="status-badge" style="margin-left:8px"><span class="sbdot"></span>paused</span>'
            : (routineJob.lastStatus === 'err'
                ? '<span class="status-badge err" style="margin-left:8px"><span class="sbdot"></span>last run failed</span>'
                : '<span class="status-badge ok" style="margin-left:8px"><span class="sbdot"></span>active</span>')))
    : '';
  const header = t
    ? '<div class="thread-header"><div class="meta-row" style="display:flex;align-items:center;flex-wrap:wrap;gap:6px"><span class="tag">' + (isRoutine ? 'routine' : 'thread') + '</span>' +
      routineBadge +
      '<span class="meta">' + esc(fmtTime(t.created_at)) + ' · ' + state.messages.length + ' messages · ~' + Math.round(charCount/4).toLocaleString() + ' tokens</span>' +
      routineCtrls + '</div>' +
      '<h1>' + esc(t.name || 'New thread') + '</h1>' +
      (routineJob
        ? '<p class="sub" style="margin-top:4px;font-size:12px;color:var(--fg-4);font-family:var(--font-mono)">' +
            esc(routineJob.cron) + ' · ' +
            (routineJob.runs || 0) + ' run' + (routineJob.runs === 1 ? '' : 's') +
            (routineJob.last ? ' · last ' + esc(routineJob.last) : '') +
            ' · next ' + esc(routineJob.next || '—') +
          '</p>'
        : '') +
      '</div>'
    : '<div class="thread-header"><div class="meta-row"><span class="tag accent">new</span></div><h1>Start a new thread</h1></div>';
  const empty = !state.messages.length
    ? '<div class="empty"><img class="duck-big duck-idle" src="/static/logo.png" alt=""><h3>Ask anything</h3>' +
      '<p>qwe-qwe runs on-device. Tools, memory, and scheduled work are all wired into this canvas.</p></div>'
    : '';
  const chipStrip = (state.pendingAttachments.length || state.capturedFrame)
    ? '<div class="attach-strip">' +
        (state.capturedFrame
          ? '<div class="attach-chip"><div class="thumb"><img src="' + state.capturedFrame + '" alt=""></div>' +
              '<span class="name">camera frame</span>' +
              '<button class="x" data-act="drop-frame" title="Remove">' + ico('close', 11) + '</button></div>'
          : '') +
        state.pendingAttachments.map(a =>
          '<div class="attach-chip">' +
            '<div class="thumb">' + (a.isImage && a.b64 ? '<img src="' + a.b64 + '">' : ico(a.isImage ? 'image' : 'attach', 12)) + '</div>' +
            '<span class="name" title="' + esc(a.name) + '">' + esc(a.name) + '</span>' +
            '<span class="sz">' + humanSize(a.size || 0) + '</span>' +
            '<button class="x" data-drop-att="' + esc(a.id) + '" title="Remove">' + ico('close', 11) + '</button>' +
          '</div>').join('') +
      '</div>'
    : '';
  const voiceStateBadge = state.voiceLive && state.voiceState !== 'idle'
    ? '<span class="voice-state ' + state.voiceState + '"><span class="sbdot"></span>' + state.voiceState + '</span>'
    : '';
  const composer =
    '<div class="composer">' +
      '<div class="hint"><span>Continue the thread, or try:</span>' +
        ['/recall', '/remember', '/cron', '/tools'].map(c => '<button class="slash" data-slash="'+c+'">'+c+'</button>').join('') +
      '</div>' +
      '<div class="box">' + chipStrip +
        '<textarea id="composer-ta" rows="1" placeholder="Reply to ' + esc(state.soul.agent_name || 'qwe-qwe') + '…"></textarea>' +
        '<div class="actions">' +
          '<div class="left">' +
            '<button class="icon-btn" data-act="attach" title="Attach file">' + ico('attach', 14) + '</button>' +
            '<button class="icon-btn" data-act="image" title="Attach image">' + ico('image', 14) + '</button>' +
            '<button class="icon-btn ' + (state.cameraOn ? 'active' : '') + '" data-act="camera-toggle" title="Camera">' + ico('eye', 14) + '</button>' +
            '<button class="icon-btn ' + (state.voiceLive ? 'active' : '') + '" data-act="voice-toggle" title="Live voice mode">' + ico('mic', 14) + '</button>' +
            voiceStateBadge +
            '<div class="vdivider" style="margin:0 6px"></div>' +
            '<span class="agent-pill">' + ico('bolt', 10) + ' Agent ' + ico('arrow', 8, 'style="transform:rotate(-90deg)"') + '</span>' +
          '</div>' +
          '<div class="right"><span class="counter" id="composer-count">0</span>' +
            (state.busy
              ? '<button class="btn-danger" data-act="abort-turn" style="padding:5px 12px;font-size:12px;display:inline-flex;align-items:center;gap:5px">' + ico('close', 11) + 'Stop</button>'
              : '<button class="btn-primary" id="composer-send" disabled>Send <span class="kbd">↵</span></button>') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  return '<div class="scroll-col" id="chat-scroll"><div class="inner">' + header +
    '<div style="flex:1;display:flex;flex-direction:column">' + (state.messages.map(renderMessage).join('') || empty) + '</div>' +
    composer + '</div></div>';
}

function renderInspector() {
  const st = state.status || {};
  const lt = state.lastTurn || null;
  const t = activeThread();
  const threadTokens = (t && t.est_tokens) || 0;
  const threadMsgs = (t && (t.messages || 0)) || state.messages.length;

  // Context Window — the PRACTICAL limit is context_budget (agent-side
  // ceiling that triggers compaction + tool-result truncation), not the
  // model's raw context length. If context_budget=24k and model_context=128k,
  // the agent will compact at ~24k regardless. So:
  //   - Gauge denominator = context_budget (what actually governs the agent).
  //   - model_context shown alongside as reference + a warning if
  //     context_budget > model_context (misconfiguration — agent would try
  //     to pack more tokens than the model can accept).
  const budget = st.context_budget
    || (state.settings && state.settings.context_budget)
    || 24000;
  const modelCtx = st.model_context
    || (state.settings && (state.settings.model_context || state.settings.ollama_num_ctx))
    || 0;
  const ctxSource = st.model_context_source || (modelCtx ? 'setting' : 'unknown');
  const budgetOverflow = modelCtx > 0 && budget > modelCtx;  // misconfig warning
  // Numerator: actual prompt tokens that went into the model on the last turn.
  // Fall back to thread-history estimate only when no turn has happened yet.
  const lastPrompt = (lt && lt.prompt_tokens) || threadTokens || 0;
  const pct = budget > 0 ? Math.min(100, (lastPrompt / budget) * 100) : 0;
  const pctColor = pct >= 90 ? 'var(--err)' : pct >= 75 ? 'var(--warn)' : pct >= 50 ? 'var(--accent)' : 'var(--ok)';

  // Sparkbars from real per-turn token counts
  const timeline = state.tokenTimeline.length ? state.tokenTimeline : [0];
  const maxT = Math.max.apply(null, timeline.concat([1]));

  const pills = state.memoryPills || [];

  // Active skills — from /api/status.skills
  const skillList = Array.isArray(st.skills) ? st.skills : [];
  // Ground-truth from /api/status.core_tools (what's actually in tools.TOOLS)
  const coreCore = (st.core_tools && st.core_tools.length)
    ? st.core_tools
    : ['memory_search','memory_save','read_file','write_file','shell','http_request','camera_capture'];
  const colorFor = (n) => {
    if (n.startsWith('memory_')) return 'var(--magic)';
    if (n === 'shell' || n === 'write_file') return 'var(--warn)';
    if (n.startsWith('browser_') || n === 'http_request') return 'var(--ok)';
    if (n === 'camera_capture' || n === 'read_file') return 'var(--info)';
    return 'var(--fg-3)';
  };
  const chips = Array.from(new Set(coreCore.concat(skillList))).map(n =>
    '<span class="tool-chip"><span class="dot" style="background:' + colorFor(n) + '"></span>' + esc(n) + '</span>'
  ).join('');

  // Latency bars — normalized against reasonable maxima
  const decodeNorm = Math.min(1, (lt && lt.tok_per_sec || 0) / 100); // >100 tok/s = full bar
  const durNorm = Math.min(1, (lt && lt.duration_ms || 0) / 10000); // 10s = full
  // (removed dead `toolCount` — state.lastTurnId was never assigned and the
  // variable wasn't displayed anywhere.)

  return '<aside class="inspector">' +
    '<div class="insp-head"><h2>Inspector</h2>' +
      '<button class="icon-btn" data-act="toggle-inspector" title="Hide panel">' + ico('close', 13) + '</button></div>' +

    // Thread meta
    '<div class="insp-section"><div class="insp-section-hdr"><h3>Thread</h3></div>' +
      '<div class="kv-grid">' +
        '<span class="k">Model</span><span class="v">' + esc(state.model.model || st.model || '—') + '</span>' +
        '<span class="k">Provider</span><span class="v">' + esc(state.model.provider || st.provider || '—') + '</span>' +
        '<span class="k">Agent</span><span class="v">' + esc(state.soul.agent_name || st.agent || '—') + '</span>' +
        '<span class="k">Status</span><span class="v">' + (state.wsReady ? (state.busy ? 'running' : 'idle') : 'offline') + '</span>' +
        '<span class="k">Messages</span><span class="v">' + threadMsgs.toLocaleString() + '</span>' +
      '</div></div>' +

    // Context window — BIG gauge. Denominator = context_budget (agent-side
    // compaction trigger — the PRACTICAL ceiling). Model context shown as
    // reference below. Over-budget = agent will start compacting / truncating
    // tool results. Over-model-ctx = provider would error (we warn).
    '<div class="insp-section">' +
      '<div class="insp-section-hdr"><h3>Context window</h3></div>' +
      '<div class="token-gauge">' +
        '<div class="row"><div><span class="used">' + lastPrompt.toLocaleString() + '</span>' +
          '<span class="total">/ ' + (budget/1000).toFixed(0) + 'k</span></div>' +
          '<span class="pct" style="color:' + pctColor + '">' + pct.toFixed(1) + '%</span></div>' +
        '<div class="bar"><div class="fill" style="width:' + pct + '%;background:' + pctColor + '"></div></div>' +
        '<div style="font-size:9px;color:var(--fg-4);margin-top:4px;font-family:var(--font-mono);display:flex;justify-content:space-between;gap:8px">' +
          '<span title="Prompt tokens from last API call / context_budget (agent-side limit, triggers compaction). Change in Settings → Model.">prompt tokens · agent budget</span>' +
          (modelCtx > 0
            ? '<span title="Model\'s native context limit (' + (ctxSource === 'detected' ? 'auto-detected' : ctxSource === 'override' ? 'manually set' : 'from setting') + '). The agent stays below context_budget so it never hits this.">model ' + (modelCtx/1000).toFixed(0) + 'k</span>'
            : '<span title="Model context unknown — set model_context in Settings → Inference">model ?</span>') +
        '</div>' +
        (budgetOverflow
          ? '<div style="font-size:10px;color:var(--err);margin-top:6px;padding:5px 8px;background:rgba(255,80,80,0.08);border:1px solid var(--err);border-radius:4px;line-height:1.4">⚠ context_budget (' + (budget/1000).toFixed(0) + 'k) exceeds the model\'s actual context (' + (modelCtx/1000).toFixed(0) + 'k). Lower context_budget in Settings → Model to avoid provider errors.</div>'
          : '') +
      '</div>' +
      // Sparkline — prompt_tokens per turn history (shows growth trajectory)
      '<div style="margin-top:14px"><div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:10px;font-family:var(--font-mono);color:var(--fg-4)">' +
        '<span>tokens / turn</span><span>last ' + timeline.length + '</span></div>' +
        '<div class="sparkbars">' +
          timeline.map(v => '<div class="bar" style="height:' + (v/maxT)*100 + '%;opacity:' + (0.3 + (v/maxT)*0.7) + '"></div>').join('') +
        '</div></div>' +
      // Last-turn breakdown (OUTPUT + TOK/SEC + THREAD history)
      (lt
        ? '<div class="mini-stats">' +
            '<div class="mini-stat"><div class="lbl">OUTPUT</div><div class="v">' + (lt.tokens || 0).toLocaleString() + '</div></div>' +
            '<div class="mini-stat"><div class="lbl">TOK/SEC</div><div class="v">' + (lt.tok_per_sec ? lt.tok_per_sec.toFixed(0) : '—') + '</div></div>' +
            '<div class="mini-stat"><div class="lbl">HISTORY</div><div class="v">' + threadTokens.toLocaleString() + '</div></div>' +
          '</div>'
        : '<div class="mini-stats">' +
            '<div class="mini-stat"><div class="lbl">HISTORY</div><div class="v">' + threadTokens.toLocaleString() + '</div></div>' +
          '</div>') +
    '</div>' +

    // Recalled memories — live from agent._build_context() via WS 'recall'
    // event. Shows the EXACT items the agent saw in its system prompt this
    // turn (thread-scoped + wiki + entity + cross-thread synthesized +
    // experience).
    '<div class="insp-section"><div class="insp-section-hdr"><h3>Recalled memories</h3>' +
      (pills.length ? '<span class="count">' + pills.length + '</span>' : '') +
      (state.memoryPillsReal ? '<span class="tag" style="font-size:9px;color:var(--ok);border-color:var(--ok)" title="What the agent actually recalled in this turn\'s system prompt">live</span>' : '') +
    '</div>' +
      (pills.length
        ? pills.map(m =>
            '<div class="mem-pill"><div class="hdr">' +
              '<span class="rel">' + Math.round((m.relevance || 0.5) * 100) + '%</span>' +
              '<span style="width:1px;height:9px;background:var(--line-2)"></span>' +
              '<span class="tag-sm">' + esc(m.tag || 'memory') + '</span>' +
              (m.source ? '<span class="age" title="Recall source" style="font-family:var(--font-mono);font-size:9px;opacity:0.7">' + esc(m.source) + '</span>' : '') +
              (m.age ? '<span class="age">' + esc(m.age) + '</span>' : '') +
            '</div><div class="txt">' + esc(m.text || '') + '</div></div>').join('')
        : '<div style="font-size:11px;color:var(--fg-4);line-height:1.5">Send a message — the agent\'s live recall (from thread + wiki + entity + synthesized knowledge) will stream here. Or upload files on the <a href="#" data-nav="memory" style="color:var(--accent)">Memory</a> tab to seed the knowledge base.</div>') +
    '</div>' +

    // Active tools — chips
    '<div class="insp-section"><div class="insp-section-hdr"><h3>Active tools</h3><span class="count">' + (coreCore.length + skillList.length) + '</span></div>' +
      '<div>' + chips + '</div>' +
    '</div>' +

    // Latency — bar indicators of the last turn
    (lt
      ? '<div class="insp-section"><div class="insp-section-hdr"><h3>Latency</h3></div>' +
          '<div style="display:grid;gap:6px;font-size:11px">' +
            '<div class="latency-row"><span class="lbl">decode/s</span><div class="bar"><div class="fill" style="width:' + (decodeNorm*100) + '%"></div></div><span class="val">' + (lt.tok_per_sec || 0).toFixed(1) + ' tok</span></div>' +
            '<div class="latency-row"><span class="lbl">duration</span><div class="bar"><div class="fill" style="width:' + (durNorm*100) + '%"></div></div><span class="val">' + ((lt.duration_ms || 0) / 1000).toFixed(2) + ' s</span></div>' +
            (lt.context_hits ? '<div class="latency-row"><span class="lbl">recall hits</span><div class="bar"><div class="fill" style="width:' + Math.min(100, lt.context_hits * 20) + '%"></div></div><span class="val">' + lt.context_hits + '</span></div>' : '') +
          '</div></div>'
      : '') +
  '</aside>';
}

function renderGraphSvg() {
  const g = state.kbGraph || { nodes: [], links: [], byId: {} };
  if (!g.nodes.length) {
    const hasFiles = (state.kbFiles || []).length > 0;
    const inner = hasFiles
      ? '<div style="font-size:12.5px;color:var(--fg-3);line-height:1.6;margin-bottom:12px">' +
          'Graph entities are extracted by the <span style="color:var(--accent)">night synthesis</span> job (runs ~03:00 by default). Indexed files don\'t appear here until then.' +
        '</div>' +
        '<div class="mono" style="font-size:10.5px;color:var(--fg-4)">Settings → Automation → <span style="color:var(--fg-3)">synthesis_time</span></div>'
      : '<div style="font-size:12.5px;color:var(--fg-3);line-height:1.6;margin-bottom:8px">Empty graph — nothing indexed yet.</div>' +
        '<div style="font-size:11px;color:var(--fg-4)">Drop a file above to start.</div>';
    return '<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:24px">' +
      '<div style="max-width:320px;text-align:center">' + inner + '</div>' +
    '</div>';
  }
  const q = (state.kbSearch || '').toLowerCase();
  const hit = (n) => !q || (n.id || '').toLowerCase().includes(q) || (n.description || '').toLowerCase().includes(q);
  // Track which nodes match search so we can highlight their edges
  const hitSet = new Set(g.nodes.filter(hit).map(n => n.id));
  const lines = g.links.map(l => {
    const A = g.byId[l.source], B = g.byId[l.target];
    if (!A || !B) return '';
    const both = hitSet.has(l.source) && hitSet.has(l.target);
    const opa = q ? (both ? 0.6 : 0.1) : 0.45;
    const stroke = (q && both) ? 'var(--accent)' : 'var(--line-strong)';
    return '<line x1="'+A.x+'" y1="'+A.y+'" x2="'+B.x+'" y2="'+B.y+
      '" stroke="'+stroke+'" stroke-width="0.8" opacity="'+opa+'" data-edge="'+esc(l.source)+'|'+esc(l.target)+'" />';
  }).join('');
  const nodes = g.nodes.map(n => {
    const show = hit(n);
    // Node radius: base 3.2 in 200-unit viewBox, scaled by weight
    const rBase = Math.max(3.2, Math.min(6.4, 3.2 + (n.weight || 0) / 4));
    const rHalo = rBase * 2.2;
    const label = esc(String(n.id).slice(0, 22));
    const isPicked = state.kbPicked && state.kbPicked.id === n.id;
    return '<g class="kb-node ' + (isPicked ? 'picked' : '') + '" data-kb-node="'+esc(n.id)+'" style="cursor:grab;opacity:'+(show?1:0.18)+'">' +
      '<circle class="halo" cx="'+n.x+'" cy="'+n.y+'" r="'+rHalo+'" fill="'+n.color+'" opacity="0.18"/>' +
      '<circle class="core" cx="'+n.x+'" cy="'+n.y+'" r="'+rBase+'" fill="'+n.color+'" stroke="' + (isPicked ? 'var(--fg)' : 'rgba(255,255,255,0.2)') + '" stroke-width="' + (isPicked ? 0.6 : 0.3) + '"/>' +
      '<text x="'+n.x+'" y="'+(n.y + rBase + 5.6)+'" font-size="3.6" font-family="var(--font-ui)" fill="' + (isPicked ? 'var(--fg)' : 'var(--fg-3)') + '" text-anchor="middle" style="pointer-events:none;paint-order:stroke;stroke:var(--bg-inspector);stroke-width:0.7">' + label + '</text>' +
    '</g>';
  }).join('');
  const v = state.kbView || { tx: 0, ty: 0, zoom: 1 };
  return '<svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet" style="overflow:hidden" data-graph-svg>' +
    '<g id="graph-root" transform="translate(' + v.tx + ' ' + v.ty + ') scale(' + v.zoom + ')">' +
      lines + nodes +
    '</g>' +
  '</svg>';
}

// Map raw phase names from server → human labels shown in the progress strip
const KB_PHASE_LABELS = {
  fetch: 'Fetching',
  convert: 'Converting',
  cpu: 'Chunking',
  gpu: 'Embedding',
  index: 'Indexing',
  done: 'Done',
};

function renderKbProgress() {
  const s = state.kbStatus;
  if (!s || s.status !== 'running') return '';
  const phase = KB_PHASE_LABELS[s.phase] || (s.phase || 'Indexing');
  const cur = Number(s.current || 0), total = Number(s.total || 0);
  const pct = total > 0 ? Math.min(100, (cur / total) * 100) : 0;
  const fileLabel = s.file || '…';
  return '<div class="kb-progress">' +
    '<div class="spinner"></div>' +
    '<div class="phase">' + esc(phase) + '…</div>' +
    '<div class="file" title="' + esc(fileLabel) + '">' + esc(fileLabel) + '</div>' +
    '<div class="bar"><div class="fill" style="width:' + pct + '%"></div></div>' +
    '<div class="counter">' + cur + (total ? ' / ' + total : '') + '</div>' +
  '</div>';
}

function renderKbRecent() {
  const items = state.kbRecent || [];
  if (!items.length) return '';
  const now = Date.now() / 1000;
  const agoLabel = (ts) => {
    const d = Math.max(0, now - (ts || 0));
    if (d < 60) return Math.round(d) + 's ago';
    if (d < 3600) return Math.round(d / 60) + 'm ago';
    if (d < 86400) return Math.round(d / 3600) + 'h ago';
    return Math.round(d / 86400) + 'd ago';
  };
  const iconFor = (kind) => kind === 'url' ? 'globe'
    : kind === 'batch' ? 'package'
    : kind === 'file' ? 'book'
    : 'check';
  const rows = items.slice(0, 5).map(it => {
    const cls = it.status === 'error' ? 'err' : (it.status === 'partial' ? 'partial' : 'done');
    const label = it.label || it.url || '(unnamed)';
    const chunks = it.chunks || 0;
    const dur = it.duration_sec ? it.duration_sec.toFixed(1) + 's' : '';
    // YouTube-specific warning when we only got metadata (transcript blocked)
    const warn = (it.has_transcript === false)
      ? ' · metadata only (' + esc(it.fallback_reason || 'no transcript') + ')'
      : '';
    const tooltip = (it.url || label) + (warn ? ' — ' + warn.replace(/ · /, '') : '');
    return '<div class="row ' + cls + '" title="' + esc(tooltip) + '">' +
      '<div class="rk-icon">' + ico(iconFor(it.kind), 12) + '</div>' +
      '<div class="lbl">' + esc(label) + (warn ? '<span style="color:var(--warn);font-size:10px;font-family:var(--font-mono);margin-left:8px">⚠ metadata only</span>' : '') + '</div>' +
      '<div class="chunks">' + (chunks ? chunks + ' ch' : (it.status === 'error' ? 'err' : '—')) + '</div>' +
      '<div class="dur">' + esc(dur) + '</div>' +
      '<div class="ago">' + esc(agoLabel(it.ts)) + '</div>' +
    '</div>';
  }).join('');
  return '<div class="kb-recent">' +
    '<div class="hdr">' + ico('clock', 11) + '<span>Recent activity</span>' +
      '<span style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--fg-5);letter-spacing:0">' + items.length + ' total</span>' +
    '</div>' +
    '<div class="rows">' + rows + '</div>' +
  '</div>';
}

function renderMemoryView() {
  const files = state.kbFiles || [];
  const kinds = ['all'].concat(Array.from(new Set(files.map(f => f.kind))));
  const filter = state.kbKindFilter;
  const q = (state.kbSearch || '').toLowerCase();
  const filtered = files.filter(f =>
    (filter === 'all' || f.kind === filter) &&
    (!q || f.name.toLowerCase().includes(q) || (f.sub || '').toLowerCase().includes(q))
  );
  const totalChunks = files.reduce((n, f) => n + (f.chunks || 0), 0);
  const g = state.kbGraph || { nodes: [], links: [] };
  const status = state.kbStatus;
  const indexing = status && status.status === 'running'
    ? '<div class="tag accent" style="margin-left:8px">indexing ' + (status.current||0) + '/' + (status.total||0) + '</div>'
    : '';

  const picked = state.kbPicked;
  const pickedInfo = picked
    ? '<div class="graph-info"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
        '<span style="width:7px;height:7px;border-radius:50%;background:' + picked.color + '"></span>' +
        '<span style="font-size:12.5px;color:var(--fg);font-weight:500">' + esc(picked.id) + '</span>' +
        '<span class="tag" style="margin-left:auto">' + esc(picked.type || 'entity') + '</span>' +
      '</div>' +
      '<div class="mono" style="font-size:10.5px;color:var(--fg-4)">connected to ' +
        g.links.filter(l => l.source === picked.id || l.target === picked.id).length +
        ' nodes · weight ' + (picked.weight || 0) + '</div>' +
      (picked.description ? '<div style="font-size:11.5px;color:var(--fg-2);margin-top:6px;line-height:1.5">' + esc(picked.description) + '</div>' : '') +
    '</div>'
    : '<div class="graph-empty">scroll to zoom · drag empty space to pan · drag a node to move it · click to pick · double-click to reset</div>';

  const kbRow = (k) => {
    const kind = KB_KINDS[k.kind] || KB_KINDS.txt;
    return '<div class="kb-row" data-kb-file="' + esc(k.path || k.id) + '">' +
      '<div class="kind-icon" style="color:' + kind.c + '">' + ico(kind.icon, 13) + '</div>' +
      '<div style="min-width:0">' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">' +
          '<span class="kb-name">' + esc(k.name) + '</span>' +
          '<span class="kb-kind" style="color:' + kind.c + ';border:1px solid ' + kind.c + '33">' + kind.label + '</span>' +
        '</div>' +
        '<div class="kb-sub">' + esc(k.sub || '') + '</div>' +
      '</div>' +
      '<div class="kb-stat"><div class="num">' + (k.chunks || 0).toLocaleString() + '</div><div class="lbl">chunks</div></div>' +
      '<div class="kb-stat"><div class="num">' + esc(k.size || '—') + '</div><div class="lbl">' + esc(k.added || 'added') + '</div></div>' +
      '<div class="kb-actions">' +
        '<button class="icon-btn" data-kb-act="preview" data-path="' + esc(k.path) + '">' + ico('eye', 13) + '</button>' +
        '<button class="icon-btn" data-kb-act="delete" data-path="' + esc(k.path) + '">' + ico('trash', 13) + '</button>' +
      '</div>' +
    '</div>';
  };

  // Total size + last indexed for the eyebrow
  const totalBytes = files.reduce((n, f) => {
    const m = /(\d+\.?\d*)\s*(B|KB|MB|GB)/i.exec(f.size || '');
    if (!m) return n;
    const units = { B:1, KB:1024, MB:1024*1024, GB:1024*1024*1024 };
    return n + parseFloat(m[1]) * (units[m[2].toUpperCase()] || 1);
  }, 0);
  const avgChunksPerSource = files.length ? Math.round(totalChunks / files.length) : 0;
  const topTags = {};
  files.forEach(f => (f.tags || []).forEach(tag => { topTags[tag] = (topTags[tag] || 0) + 1; }));
  const topTagList = Object.entries(topTags).sort((a,b) => b[1] - a[1]).slice(0, 3).map(([k]) => k).join(' · ') || '—';

  return '<div class="scroll-col"><div class="inner-xwide">' +
    '<div class="page-hdr"><div class="copy">' +
      '<div class="eyebrow">KNOWLEDGE · ' + totalChunks.toLocaleString() + ' chunks · ' + humanSize(totalBytes) + (files.length ? ' · ' + files.length + ' source' + (files.length === 1 ? '' : 's') : '') + '</div>' +
      '<h1>What qwe-qwe knows</h1>' +
      '<p class="sub">Documents, notes, URLs and live-watched directories. Queries retrieve chunks by semantic + keyword + graph proximity.</p>' +
    '</div>' +
    '<div style="display:flex;gap:8px;align-items:center">' + indexing +
      '<button class="chip" data-act="memory-refresh" style="padding:8px 12px">' + ico('refresh', 12) + ' reindex</button>' +
      '<button class="page-primary" data-act="memory-upload-click">' + ico('plusSmall', 12) + ' Add source</button>' +
    '</div></div>' +

    '<div class="stats-row">' +
      '<div class="stat"><div class="lbl">SOURCES</div><div class="v">' + files.length + '</div>' +
        '<div class="sub">' + (kinds.length > 1 ? (kinds.length - 1) + ' type' + (kinds.length === 2 ? '' : 's') : 'indexed files') + '</div></div>' +
      '<div class="stat"><div class="lbl">CHUNKS</div>' +
        '<div class="v">' + (totalChunks > 0 ? totalChunks.toLocaleString() : '—') + '</div>' +
        '<div class="sub">' + (totalChunks > 0
            ? (avgChunksPerSource + ' per source · ' + ((state.status && state.status.memories) || 0).toLocaleString() + ' vectors')
            : 'none indexed yet') + '</div></div>' +
      '<div class="stat"><div class="lbl">RECALLED</div>' +
        '<div class="v accent">' + (state.memoryPills.length || state.kbRecallSessionTotal || 0) + '</div>' +
        '<div class="sub">' + (state.memoryPills.length
            ? 'last turn · top: ' + esc(state.memoryPills[0].tag || 'memory')
            : (state.kbRecallSessionTotal ? 'this session' : 'send a message to recall')) + '</div></div>' +
      '<div class="stat"><div class="lbl">GRAPH</div>' +

          (g.nodes.length
            ? '<div class="graph-tools" style="display:flex;gap:2px;margin-left:auto">' +

        '<div class="graph-canvas">' + renderGraphSvg() + '</div>' +
        pickedInfo +
      '</div>' +
      '<div class="kb-panel">' +
        '<div class="hdr">' + ico('package', 12, 'style="color:var(--accent)"') +
          '<h3>Sources</h3>' +

}

function renderMemoriesPanel() {
  // Plain memories — what the chat's Save-to-memory button writes,
  // and what the agent's own memory_save tool persists. Distinct from
  // indexed knowledge sources (PDFs/URLs above) because these are
  // free-form facts/observations with no file_path.
  const entries = state.memoryEntries || [];
  const tagBreakdown = {};
  for (const e of entries) tagBreakdown[e.tag] = (tagBreakdown[e.tag] || 0) + 1;
  const tagSummary = Object.entries(tagBreakdown).sort((a, b) => b[1] - a[1])
    .map(([t, n]) => '<span class="mono" style="color:var(--fg-3)">' + esc(t) + '·' + n + '</span>')
    .join('  ');
  const row = (e) => {
    const ts = e.updated || e.created || '';
    const tagColor = e.tag === 'user' ? 'var(--accent)'
                    : e.tag === 'fact' ? 'var(--info)'
                    : e.tag === 'experience' ? 'var(--magic)'
                    : 'var(--fg-4)';
    return '<div class="mem-entry">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
        '<span class="kb-kind" style="color:' + tagColor + ';border:1px solid ' + tagColor + '33">' + esc(e.tag || 'memory') + '</span>' +
        '<span class="mono" style="font-size:10.5px;color:var(--fg-5);font-variant-numeric:tabular-nums">' + esc(ts) + '</span>' +
        (e.thread_id ? '<span class="mono" style="font-size:10px;color:var(--fg-5)">thread ' + esc(e.thread_id.slice(0, 12)) + '</span>' : '') +
        '<span style="margin-left:auto;font-size:10.5px;color:var(--fg-5)">' + (e.len || 0) + ' chars</span>' +
        '<button class="icon-btn" data-mem-del="' + esc(e.id) + '" title="Delete this memory">' + ico('trash', 11) + '</button>' +
      '</div>' +
      '<div class="mem-text">' + esc(e.preview || '') + '</div>' +
    '</div>';
  };
  return '<div class="memories-block">' +
    '<div class="hdr" style="display:flex;align-items:center;gap:10px;margin:24px 0 10px">' +
      ico('book', 13, 'style="color:var(--accent)"') +
      '<h3 style="margin:0;font-size:15px">Saved memories</h3>' +
      '<span class="meta" style="color:var(--fg-4);font-size:11px">' + entries.length + ' entries' +
        (tagSummary ? '  ·  ' + tagSummary : '') + '</span>' +
    '</div>' +
    '<div class="memories-list">' +
      (entries.length === 0
        ? '<div style="padding:24px;text-align:center;color:var(--fg-4);font-size:12px;border:1px dashed var(--line);border-radius:8px">' +
          'No memories yet. Use the 📖 button on any chat message to save it here, or the agent will save facts when you say <span class="mono">"запомни …"</span>.' +
          '</div>'
        : entries.map(row).join('')) +
    '</div>' +
  '</div>';
}

function renderSchedulerView() {
  const jobs = state.cronJobs;
  const active = jobs.filter(j => j.status === 'active').length;
  const paused = jobs.length - active;
  const totalRuns = jobs.reduce((n, j) => n + (j.runs || 0), 0);
  const errRuns = jobs.filter(j => j.lastStatus === 'err').length;
  const rt = state.runningTasks || { pending: 0, results: [] };
  const recent = (rt.results || []).slice(-4).reverse();
  const runningStrip = (rt.pending || recent.length)
    ? '<div style="display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--line);flex-wrap:wrap">' +
        '<span class="mono" style="font-size:10px;color:var(--fg-4);letter-spacing:0.1em;text-transform:uppercase;margin-right:4px">Running now</span>' +
        (rt.pending
          ? '<span class="status-badge warn"><span class="sbdot"></span>' + rt.pending + ' pending</span>'
          : '<span class="status-badge ok"><span class="sbdot"></span>idle</span>') +
        recent.map(r =>
          '<span class="tag ' + (r.error ? 'err' : 'ok') + '">' +
            esc((r.name || 'task').slice(0, 32)) +
            (r.duration ? ' · ' + (r.duration*1).toFixed(1) + 's' : '') +
          '</span>').join('') +
      '</div>'
    : '';
  // Human-friendly schedule label — "Every day at ~9:00" style.
  // Parses the scheduler DSL (every Nh, daily HH:MM, in Nh, HH:MM) into
  // a natural English summary for the card's subtitle line.
  const scheduleHuman = (s) => {
    const t = (s || '').trim().toLowerCase();
    let m;
    if ((m = t.match(/^daily\s+(\d{1,2}):(\d{2})$/))) return `Every day at ~${m[1]}:${m[2]}`;
    if ((m = t.match(/^every\s+(\d+)\s*(s|m|h)$/))) {
      const unit = { s: 'second', m: 'minute', h: 'hour' }[m[2]];
      const n = parseInt(m[1], 10);
      return `Every ${n === 1 ? '' : n + ' '}${unit}${n === 1 ? '' : 's'}`;
    }
    if ((m = t.match(/^in\s+(\d+)\s*(s|m|h)$/))) {
      const unit = { s: 'second', m: 'minute', h: 'hour' }[m[2]];
      return `Once, in ${m[1]} ${unit}${m[1] === '1' ? '' : 's'}`;
    }
    if ((m = t.match(/^(\d{1,2}):(\d{2})$/))) return `Once at ~${m[1]}:${m[2]}`;
    return s;
  };

  // Split system tasks (heartbeat, synthesis) off from user routines —
  // they're infrastructure, not user-facing routines. Show count only.
  const sysJobs = jobs.filter(j => j.name && j.name.startsWith('__'));
  const userJobs = jobs.filter(j => !j.name || !j.name.startsWith('__'));
  const activeUser = userJobs.filter(j => j.status === 'active').length;

  return '<div class="scroll-col"><div class="inner-wide">' +
    '<div class="page-hdr"><div class="copy">' +
      '<div class="eyebrow">ROUTINES · ' + userJobs.length + ' total · ' + activeUser + ' active' +
        (sysJobs.length ? ' · ' + sysJobs.length + ' system' : '') + '</div>' +
      '<h1>Routines</h1>' +
      '<p class="sub">Templated tasks that run on schedule. Each routine has its own chat thread — every run streams in as a new turn with full tool-call history.</p>' +
    '</div><button class="page-primary" data-act="new-cron">' + ico('plusSmall', 12) + ' New routine</button></div>' +

    // Awake-only banner — borrowed from Claude Routines, sets correct
    // expectation: qwe-qwe is local-first, no cloud cron daemon.
    '<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--line-2);margin:18px 0 12px;font-size:12px;color:var(--fg-3)">' +
      ico('shield', 14) + '<span>Local routines only run while your computer is awake.</span>' +
    '</div>' +

    '<div class="stats-row">' +
      '<div class="stat"><div class="lbl">ACTIVE</div><div class="v" style="color:var(--ok)">' + activeUser + '</div><div class="sub">' + (userJobs.length - activeUser) + ' paused</div></div>' +
      '<div class="stat"><div class="lbl">TOTAL RUNS</div><div class="v">' + totalRuns.toLocaleString() + '</div><div class="sub">all time</div></div>' +
      '<div class="stat"><div class="lbl">NEXT</div><div class="v" style="font-size:20px;line-height:1.4">' + esc((userJobs.find(j=>j.next)||{}).next || '—') + '</div><div class="sub">upcoming</div></div>' +
      '<div class="stat"><div class="lbl">LAST ERRORS</div><div class="v" style="color:' + (errRuns ? 'var(--err)' : 'var(--fg-3)') + '">' + errRuns + '</div><div class="sub">' + (errRuns ? 'failing routines' : 'all healthy') + '</div></div>' +
    '</div>' +
    runningStrip +
    '<div class="card-grid">' +
      userJobs.map(j => {
        const errLast = j.lastStatus === 'err' || (j.last || '').toLowerCase().startsWith('err');
        const hasThread = !!j.threadId;
        const schedLine = scheduleHuman(j.cron);
        const nextLine = j.next ? ' · Next run ' + esc(j.next) : '';
        // Click-to-open: whole card is an anchor to the routine's thread.
        // Icon buttons stopPropagation in the handler so they don't
        // navigate-on-click.
        const isPaused = j.status === 'paused';
        const cardStyle = 'cursor:' + (hasThread ? 'pointer' : 'default') + ';' +
                          (isPaused ? 'opacity:0.55;' : '');
        return '<div class="job-card"' + (hasThread ? ' data-open-thread="' + esc(j.threadId) + '"' : '') + ' style="' + cardStyle + '">' +
          '<div class="job-hdr"><div style="flex:1">' +
            '<div class="job-title-row">' +
              '<span class="status-dot ' + (j.status === 'active' ? 'ok' : '') + (errLast ? ' err' : '') + '"></span>' +
              '<span class="job-title">' + esc(j.name) + '</span>' +
              (isPaused ? '<span class="tag" style="margin-left:6px;font-size:9px">paused</span>' : '') +
              (j.firing ? '<span class="status-badge warn" style="margin-left:6px;font-size:9px"><span class="sbdot"></span>running</span>' : '') +
            '</div>' +
            '<span class="job-cron">' + esc(schedLine) + nextLine + '</span></div>' +
            '<div style="display:flex;gap:2px;opacity:0.7">' +
              '<button class="icon-btn" data-cron="' + esc(j.id) + '" data-cron-act="toggle" title="' + (isPaused ? 'Resume' : 'Pause') + '">' + ico(isPaused ? 'play' : 'pause', 11) + '</button>' +
              (isPaused ? '' :
                '<button class="icon-btn" data-cron="' + esc(j.id) + '" data-cron-act="run-now" title="Run now (fire the routine immediately)">' + ico('play', 11) + '</button>') +
              '<button class="icon-btn" data-cron="' + esc(j.id) + '" data-cron-act="delete" title="Delete routine (archives the thread)">' + ico('trash', 11) + '</button>' +
            '</div></div>' +
          (j.last
            ? '<div style="font-size:11px;color:' + (errLast ? 'var(--err)' : 'var(--fg-4)') + ';margin-top:6px;font-family:var(--font-mono)">last ' + esc(j.last) + ' · ' + (j.runs||0).toLocaleString() + ' runs</div>'
            : '<div style="font-size:11px;color:var(--fg-5);margin-top:6px;font-family:var(--font-mono)">not run yet</div>') +
          // Sparkline of last 20 fires — one dot per attempt, colored
          // by status. Shows missed (server-offline) runs alongside
          // ok/err so users see the real timeline.
          (j.recent && j.recent.series && j.recent.series.length
            ? '<div class="run-sparkline" title="Last ' + j.recent.series.length + ' fires · ok=' + (j.recent.counts.ok || 0) + ' err=' + (j.recent.counts.err || 0) + ' missed=' + (j.recent.counts.missed || 0) + ' skipped=' + (j.recent.counts.skipped || 0) + '">' +
                j.recent.series.map(s => {
                  const color = s === 'ok' ? 'var(--ok)'
                                : s === 'err' ? 'var(--err)'
                                : s === 'missed' ? 'var(--warn)'
                                : 'var(--fg-5)';  // skipped
                  return '<span class="run-dot" style="background:' + color + '" title="' + s + '"></span>';
                }).join('') +
              ((j.recent.counts.missed || 0) > 0
                ? '<span style="margin-left:8px;font-size:10px;color:var(--warn);font-family:var(--font-mono)">' + j.recent.counts.missed + ' missed</span>'
                : '') +
              '</div>'
            : '') +
          '</div>';
      }).join('') +
      (!userJobs.length ? '<div style="grid-column:1/-1;padding:60px 0;text-align:center;color:var(--fg-4)">No routines yet. Click <span class="mono">New routine</span> to create one.</div>' : '') +
    '</div>' +

    // System tasks — qwe-qwe's own maintenance routines (heartbeat, nightly
    // synthesis). Visually demoted (smaller, dimmed, no click-to-open) so
    // they don't visually compete with user routines. Still visible so
    // users can see run counts / status and confirm the agent is healthy.
    (sysJobs.length
      ? '<div style="margin-top:32px">' +
          '<div class="eyebrow" style="margin-bottom:10px">SYSTEM · ' + sysJobs.length + ' task' + (sysJobs.length === 1 ? '' : 's') + '</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px">' +
            sysJobs.map(j => {
              const errLast = j.lastStatus === 'err';
              const label = j.name.replace(/^__|__$/g, '');  // __heartbeat__ → heartbeat
              return '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--line-2);font-size:12px;opacity:0.75">' +
                '<span class="status-dot ' + (j.status === 'active' ? 'ok' : '') + (errLast ? ' err' : '') + '" style="flex-shrink:0"></span>' +
                '<span style="font-weight:500;color:var(--fg-2);min-width:90px">' + esc(label) + '</span>' +
                '<span class="mono" style="color:var(--fg-4);min-width:90px">' + esc(j.cron) + '</span>' +
                '<span style="color:var(--fg-4);flex:1">next ' + esc(j.next || '—') + '</span>' +
                (j.last
                  ? '<span class="mono" style="color:' + (errLast ? 'var(--err)' : 'var(--fg-3)') + '">' + esc(j.last) + ' · ' + (j.runs||0).toLocaleString() + ' runs</span>'
                  : '<span style="color:var(--fg-5)">not run yet</span>') +
                '</div>';
            }).join('') +
          '</div>' +
        '</div>'
      : '') +
    '</div></div>';
}

        '<div style="font-size:12.5px;font-weight:500;color:var(--fg-2)">Blank preset</div>' +

// ───── Settings loaders ─────
async function loadModelPicker() {
  // Fire all four in PARALLEL instead of sequentially. The server's
  // /api/providers pings local backends (up to 2s cold) and /api/models
  // hits the active provider's /v1/models endpoint (can be slow on cold
  // cloud providers) — sequential = worst case ~5–7s, parallel = max of
  // the slowest single call.
  const results = await Promise.allSettled([
    api('/api/providers'),
    api('/api/models'),
    api('/api/thinking'),
    api('/api/streaming'),
  ]);
  const [p, m, t, s] = results;
  state.providers = p.status === 'fulfilled' ? (p.value.providers || p.value || []) : [];
  state.models = m.status === 'fulfilled' ? (m.value.models || m.value || []) : [];
  if (t.status === 'fulfilled' && t.value) state.thinkingOn = !!(t.value.enabled || t.value.on);
  if (s.status === 'fulfilled' && s.value) state.streamingOn = !!(s.value.enabled !== false);
  state.modelsLoading = false;
  render();
}
async function loadSoulFull() {
  try { state.soulFull = await api('/api/soul'); render(); } catch {}
}
async function loadSkills() {
  try {
    const s = await api('/api/skills');
    state.skills = (s && s.skills) || s || [];
    render();
  } catch {}
}

// ───── Spicy mode (hidden easter-egg) ─────
async function loadSpicy() {
  try {
    const r = await api('/api/kv/spicy_duck');
    state.spicy = r && r.value === 'quack';
    applySpicy();
  } catch {}
}

function applySpicy() {
  // Swap duck logo sitewide when spicy is active
  document.querySelectorAll('img[src*="/static/logo.png"], img[src*="/static/logo-spicy.png"]').forEach(img => {
    img.src = state.spicy ? '/static/logo-spicy.png' : '/static/logo.png';
  });
}

async function spicyActivate() {
  try {
    await api('/api/kv', { method: 'POST', body: { key: 'spicy_duck', value: 'quack' } });
    state.spicy = true;
    // Burst all hearts
    document.querySelectorAll('.spicy-heart').forEach(h => {
      h.classList.add('burst');
      setTimeout(() => h.classList.remove('burst'), 500);
    });
    toast('🌶️ spicy mode unlocked — ' + (state.soul.agent_name || 'qwe-qwe') + ' gets a little naughty', 'err');
    applySpicy();
    setTimeout(() => { loadSkills(); render(); }, 600);
  } catch { toast('could not flip spicy_duck', 'err'); }

      // Server returns a bare array of keys. Array.prototype.keys is a function

      state.secrets = Array.isArray(r) ? r : (r && (r.secrets || r.list) || []);

function openFirstRunWizard() {
  const steps = ['welcome', 'identity', 'model', 'personality', 'done'];
  const s = { idx: 0, user_name: '', agent_name: 'qwe-qwe', language: 'en',
    provider: '', endpoint: '', api_key: '', model: '',
    traits: { humor: 'moderate', honesty: 'high', curiosity: 'high', brevity: 'moderate',
              formality: 'low', proactivity: 'moderate', empathy: 'moderate', creativity: 'moderate' },
    tz_offset: -new Date().getTimezoneOffset() / 60,
    tz_name: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
  };
  let discovered = [];
  const bodyFor = (step) => {
    if (step === 'welcome') {
      return '<div style="text-align:center;padding:20px 0"><img src="/static/logo.png" class="duck-idle" style="width:80px;height:80px;filter:drop-shadow(0 10px 30px rgba(255,122,26,0.3))"></div>' +
        '<p style="font-size:14px;color:var(--fg-2);line-height:1.6">Welcome to qwe-qwe — a fully local AI agent. Four quick steps and you\'re in.</p>' +
        '<ul style="margin-top:14px;color:var(--fg-3);font-size:12.5px;line-height:1.8;list-style:none;padding:0">' +
        '<li>• Identify yourself (name + agent name + language)</li>' +
        '<li>• Pick an inference provider (LM Studio, Ollama, or remote)</li>' +
        '<li>• Tune the agent\'s personality</li>' +
        '<li>• Ready.</li></ul>';
    }
    if (step === 'identity') {
      return '<div class="field"><div class="label">Your name</div><input type="text" id="st-user" value="' + esc(s.user_name) + '" placeholder="Alex" autofocus></div>' +
        '<div class="field"><div class="label">Agent name</div><input type="text" id="st-agent" value="' + esc(s.agent_name) + '"></div>' +
        '<div class="field"><div class="label">Language</div><input type="text" id="st-lang" class="mono" value="' + esc(s.language) + '" placeholder="en"><div class="hint">Two-letter code: en, ru, es, de…</div></div>';
    }
    if (step === 'model') {
      const list = discovered && discovered.length
        ? '<div class="field"><div class="label">Auto-detected</div>' +
            discovered.map((d, i) => '<button class="picker-card" data-setup-pick="' + i + '" style="width:100%;margin-bottom:6px">' +
              '<div class="name">' + esc(d.provider || d.name) + '</div>' +
              '<div class="sub">' + esc(d.url || '') + '</div></button>').join('') +
          '</div>'
        : '<div class="field"><div class="hint">No providers auto-detected on localhost. Enter endpoint manually below or install LM Studio / Ollama.</div></div>';
      return list +
        '<div class="field"><div class="label">Provider</div><select id="st-prov">' +
          ['lmstudio','ollama','openai','groq','anthropic','custom'].map(p => '<option value="' + p + '"' + (p === s.provider ? ' selected' : '') + '>' + p + '</option>').join('') +
          '</select></div>' +
        '<div class="field"><div class="label">Endpoint (optional)</div><input type="url" id="st-endpoint" class="mono" value="' + esc(s.endpoint) + '" placeholder="http://localhost:1234/v1"></div>' +
        '<div class="field"><div class="label">API key (if remote)</div><input type="password" id="st-key" value="" placeholder="sk-…"></div>' +
        '<div class="field"><div class="label">Model</div><input type="text" id="st-model" class="mono" value="' + esc(s.model) + '" placeholder="qwen2.5-coder-14b"></div>';
    }
    if (step === 'personality') {
      const levels = ['low','moderate','high'];
      const row = (name) =>
        '<div class="field" style="display:flex;align-items:center;gap:12px"><div class="label" style="flex:1;margin:0">' + esc(name) + '</div>' +
          '<select data-tr="' + name + '" class="mono">' + levels.map(l => '<option value="' + l + '"' + (l === s.traits[name] ? ' selected' : '') + '>' + l + '</option>').join('') + '</select></div>';
      return Object.keys(s.traits).map(row).join('') +
        '<div class="hint" style="margin-top:10px">These are just defaults. Tune any time in Settings → Soul.</div>';
    }
    if (step === 'done') {
      return '<div style="text-align:center;padding:20px 0"><img src="/static/logo.png" class="duck-idle" style="width:64px;height:64px;filter:drop-shadow(0 10px 30px rgba(255,122,26,0.3))"></div>' +
        '<p style="font-size:14px;color:var(--fg-2);line-height:1.6;text-align:center">' + esc(s.agent_name) + ' is ready. Hit <span class="mono">' + MOD + ' K</span> any time to navigate. Start a thread and ask anything.</p>';
    }
    return '';
  };
  const save = (fromStep) => {
    if (fromStep === 'identity') {
      s.user_name = (document.getElementById('st-user') || {}).value || '';
      s.agent_name = (document.getElementById('st-agent') || {}).value || 'qwe-qwe';
      s.language = (document.getElementById('st-lang') || {}).value || 'en';
    } else if (fromStep === 'model') {
      s.provider = (document.getElementById('st-prov') || {}).value || '';
      s.endpoint = (document.getElementById('st-endpoint') || {}).value || '';
      s.api_key = (document.getElementById('st-key') || {}).value || '';
      s.model = (document.getElementById('st-model') || {}).value || '';
    } else if (fromStep === 'personality') {
      document.querySelectorAll('[data-tr]').forEach(el => { s.traits[el.dataset.tr] = el.value; });
    }
  };
  const step = () => {
    const name = steps[s.idx];
    const isLast = s.idx === steps.length - 1;
    const isFirst = s.idx === 0;
    const actions = [];
    if (!isFirst) actions.push({ label: 'Back', onClick: () => { save(name); s.idx--; showStep(); return false; } });
    if (!isLast) actions.push({ label: 'Next', primary: true, onClick: () => { save(name); s.idx++; showStep(); return false; } });
    else actions.push({ label: 'Finish', primary: true, onClick: async () => {
      try {
        const payload = {
          user_name: s.user_name, agent_name: s.agent_name, language: s.language,
          provider: s.provider, endpoint: s.endpoint, api_key: s.api_key, model: s.model,
          traits: s.traits, tz_offset: s.tz_offset, tz_name: s.tz_name,
        };
        await api('/api/setup', { method: 'POST', body: payload });
        toast('setup complete');
        setTimeout(() => location.reload(), 400);
      } catch { toast('save failed', 'err'); return false; }
    }});
    openModal({
      title: name === 'welcome' ? 'Welcome' : name === 'done' ? 'All set' : ('Setup · ' + name),
      body: bodyFor(name),
      wide: true,
      actions,
    });
    // Step-specific wiring
    if (name === 'model') {
      api('/api/discover').then(r => { discovered = (r && r.servers) || []; const bbox = document.querySelector('.modal-body'); if (bbox) bbox.innerHTML = bodyFor('model'); wireModel(); }).catch(() => {});
      setTimeout(wireModel, 30);
    }
    function wireModel() {
      document.querySelectorAll('[data-setup-pick]').forEach(b => {
        b.onclick = () => {
          const d = discovered[parseInt(b.dataset.setupPick, 10)];
          if (!d) return;
          const prov = document.getElementById('st-prov'); if (prov && d.provider) prov.value = d.provider;
          const ep = document.getElementById('st-endpoint'); if (ep) ep.value = d.url || '';
          const mdl = document.getElementById('st-model'); if (mdl && d.model) mdl.value = d.model;
        };
      });
    }
  };
  const showStep = () => step();
  showStep();
}

async function checkOnboarding() {
  try {
    const r = await api('/api/presets/onboarding');
    if (!r || !r.show) return false;
    const text = r.text || '';
    const name = r.name || 'preset';
    // Render markdown-ish: preserve line breaks, convert ### headings, bold, lists
    const rendered = esc(text)
      .replace(/^### (.+)$/gm, '<h3 style="font-family:var(--font-serif);font-size:16px;font-weight:400;margin:14px 0 6px;color:var(--fg)">$1</h3>')
      .replace(/^## (.+)$/gm, '<h2 style="font-family:var(--font-serif);font-size:20px;font-weight:400;margin:18px 0 8px;color:var(--fg)">$1</h2>')
      .replace(/^# (.+)$/gm, '<h1 style="font-family:var(--font-serif);font-size:24px;font-weight:400;margin:20px 0 10px;color:var(--fg)">$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<span class="mono" style="background:var(--surface-2);padding:1px 5px;border-radius:3px">$1</span>')
      .replace(/^- (.+)$/gm, '<div style="margin:4px 0 4px 16px;color:var(--fg-2)">• $1</div>')
      .replace(/\n\n/g, '</p><p style="margin:10px 0;color:var(--fg-2);line-height:1.6">')
      .replace(/\n/g, '<br>');
    openModal({
      title: name + ' — getting started',
      wide: true,
      body: '<div style="color:var(--fg-2);line-height:1.6"><p style="margin:10px 0">' + rendered + '</p></div>',

function openProviderKeyModal(name) {
  // Look up the known URL + any existing config so user doesn't have to retype
  const p = (state.providers || []).find(x => (x.name || x.id) === name) || {};
  const knownUrl = p.url || p.base_url || '';
  const hints = {
    openai: 'Get at https://platform.openai.com/api-keys',
    openrouter: 'Get at https://openrouter.ai/keys',
    groq: 'Get at https://console.groq.com/keys',
    anthropic: 'Get at https://console.anthropic.com/settings/keys',
    together: 'Get at https://api.together.xyz/settings/api-keys',
    deepseek: 'Get at https://platform.deepseek.com/api_keys',
    mistral: 'Get at https://console.mistral.ai/api-keys',
    perplexity: 'Get at https://www.perplexity.ai/settings/api',
    cerebras: 'Get at https://cloud.cerebras.ai/platform/',
  };
  const hint = hints[name.toLowerCase()] || '';
  const body =
    '<div class="field"><div class="label">Provider</div>' +
      '<div class="mono" style="padding:8px 10px;background:var(--surface);border:1px solid var(--line);border-radius:5px;font-size:12px">' + esc(name) + '</div></div>' +
    '<div class="field"><div class="label">Base URL</div>' +
      '<input type="url" id="pk-url" class="mono" value="' + esc(knownUrl) + '" placeholder="https://api.example.com/v1">' +
      '<div class="hint">Usually correct — edit only if you use a proxy.</div></div>' +
    '<div class="field"><div class="label">API key</div>' +
      '<input type="password" id="pk-key" placeholder="sk-…" autofocus>' +
      (hint ? '<div class="hint">' + esc(hint) + '</div>' : '') +
    '</div>';
  openModal({
    title: 'Set API key for ' + name,
    body,
    actions: [
      { label: 'Cancel' },
      { label: 'Save + switch', primary: true, onClick: async () => {
          const url = document.getElementById('pk-url').value.trim();
          const key = document.getElementById('pk-key').value.trim();
          if (!key) { toast('api key required', 'err'); return false; }
          if (!url) { toast('url required', 'err'); return false; }
          try {
            // 1. Save provider config (adds or updates, preserves models list)
            await api('/api/provider', { method: 'POST', body: { name, url, key } });
            // 2. Switch active provider
            await api('/api/model', { method: 'POST', body: { provider: name } });
            toast('switched to ' + name);
            await loadStatus();
            await loadModelPicker();
          } catch (e) {
            toast('save failed', 'err');
            return false;
          }
      }},
    ],
  });
  // Enter in either input submits — mirrors openLoginModal
  setTimeout(() => {
    const submit = () => {
      const btn = document.querySelector('[data-modal-action]:last-child');
      if (btn) btn.click();
    };
    const onKey = (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } };
    const urlInp = document.getElementById('pk-url');
    const keyInp = document.getElementById('pk-key');
    if (urlInp) urlInp.addEventListener('keydown', onKey);
    if (keyInp) keyInp.addEventListener('keydown', onKey);
  }, 50);
}

async function openAddMcpModal() {
  // Fetch presets — if unavailable, modal still works as manual form
  let presets = {};
  try { const r = await api('/api/mcp/presets'); presets = (r && r.presets) || {}; } catch {}

  const presetCards = Object.entries(presets).map(([id, p]) => {
    const cmd = p.transport === 'stdio' ? (p.command + ' ' + (p.args || []).join(' ')) : (p.url || '');
    return '<button class="picker-card" data-mcp-preset="' + esc(id) + '" style="text-align:left">' +
      '<div class="name">' + esc(id) + '</div>' +
      '<div class="sub" style="white-space:normal">' + esc(p.description || cmd) + '</div>' +
    '</button>';
  }).join('');

  const body =
    (Object.keys(presets).length
      ? '<div class="field"><div class="label">Presets</div>' +
        '<div class="picker-grid" style="margin-top:4px">' + presetCards + '</div>' +
        '<div class="hint">Click a preset to prefill the form.</div></div>'
      : '') +
    '<div class="field"><div class="label">Name</div><input type="text" id="mc-name" placeholder="filesystem / github / ..." autofocus></div>' +
    '<div class="field"><div class="label">Transport</div><select id="mc-transport" class="setting-input mono" style="width:100%">' +
      '<option value="stdio">stdio (spawn a command)</option><option value="http">HTTP</option></select></div>' +
    '<div class="field"><div class="label">Command</div><input type="text" id="mc-cmd" class="mono" placeholder="npx"></div>' +
    '<div class="field"><div class="label">Args</div><input type="text" id="mc-args" class="mono" placeholder="-y, @modelcontextprotocol/server-filesystem, /path">' +
      '<div class="hint">Comma-separated.</div></div>' +
    '<div class="field"><div class="label">URL (HTTP transport)</div><input type="url" id="mc-url" placeholder="https://…"></div>' +
    '<div class="field"><div class="label">Env vars</div><textarea id="mc-env" placeholder="KEY=value\nOTHER=value"></textarea>' +
      '<div class="hint">One per line. Use these for API keys, tokens, etc.</div></div>';
  openModal({
    title: 'Add MCP server', body, wide: true,
    actions: [
      { label: 'Cancel' },
      { label: 'Add', primary: true, onClick: async () => {
          const name = document.getElementById('mc-name').value.trim();
          const transport = document.getElementById('mc-transport').value;
          const command = document.getElementById('mc-cmd').value.trim();
          const argsRaw = document.getElementById('mc-args').value.trim();
          const url = document.getElementById('mc-url').value.trim();
          const envRaw = document.getElementById('mc-env').value.trim();
          if (!name) { toast('name required', 'err'); return false; }
          const args = argsRaw ? argsRaw.split(',').map(x => x.trim()).filter(Boolean) : [];
          const env = {};
          envRaw.split(/\r?\n/).forEach(line => {
            const i = line.indexOf('='); if (i > 0) env[line.slice(0, i).trim()] = line.slice(i + 1).trim();
          });
          try {
            const r = await api('/api/mcp/servers', { method: 'POST', body: { name, transport, command, args, env, url, enabled: true } });
            if (r && r.error) { toast(r.error, 'err'); return false; }
            toast('added'); loadMcp();
          }
          catch { toast('add failed', 'err'); return false; }
      }},
    ],
  });
  // Wire preset click → prefill fields (defer until DOM exists)
  setTimeout(() => {
    document.querySelectorAll('[data-mcp-preset]').forEach(b => {
      b.onclick = (e) => {
        e.preventDefault();
        const id = b.dataset.mcpPreset;
        const p = presets[id];
        if (!p) return;
        const setVal = (elId, v) => { const el = document.getElementById(elId); if (el) el.value = v == null ? '' : v; };
        setVal('mc-name', id);
        setVal('mc-transport', p.transport || 'stdio');
        setVal('mc-cmd', p.command || '');
        setVal('mc-args', (p.args || []).join(', '));
        setVal('mc-url', p.url || '');
        const envLines = Object.entries(p.env || {}).map(([k, v]) => k + '=' + v).join('\n');
        setVal('mc-env', envLines);
        // Highlight picked preset
        document.querySelectorAll('[data-mcp-preset]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      };
    });
  }, 40);
}

function renderTabSoul() {
